<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiquidGold AI | Institutional XAUUSD Terminal</title>
    
    <!-- 
    SQL SCHEMA - RUN THIS IN SUPABASE SQL EDITOR:
    
    CREATE TABLE profiles (
      id UUID REFERENCES auth.users ON DELETE CASCADE PRIMARY KEY,
      subscription_status TEXT DEFAULT 'inactive',
      mt5_login BIGINT,
      mt5_server TEXT,
      bot_enabled BOOLEAN DEFAULT false,
      risk_percent FLOAT DEFAULT 1.0,
      updated_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()
    );

    CREATE TABLE trades (
      id UUID DEFAULT uuid_generate_v4() PRIMARY KEY,
      user_id UUID REFERENCES auth.users,
      symbol TEXT DEFAULT 'XAUUSD',
      type TEXT, 
      lots FLOAT,
      entry_price FLOAT,
      tp FLOAT,
      sl FLOAT,
      profit FLOAT DEFAULT 0.0,
      status TEXT DEFAULT 'OPEN', 
      created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()
    );

    -- Enable Realtime for the trades table in the Supabase Dashboard
    -->

    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        :root { --teal: #2dd4bf; --black: #050505; --card-bg: rgba(15, 15, 20, 0.8); }
        body { background-color: var(--black); color: #ffffff; font-family: 'Space Grotesk', sans-serif; background-image: radial-gradient(circle at 10% 20%, rgba(45, 212, 191, 0.05) 0%, transparent 40%); min-height: 100vh; }
        .glass { background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); }
        .teal-glow { box-shadow: 0 0 25px rgba(45, 212, 191, 0.15); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .status-pulse { width: 10px; height: 10px; border-radius: 50%; background: var(--teal); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(0.9); opacity: 0.7; } 50% { transform: scale(1.2); opacity: 1; } }
        input, select { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
        .tab-active { color: var(--teal); border-bottom: 2px solid var(--teal); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Configuration ---
        const SUPABASE_URL = "https://zqyextmqqlgyfmttuull.supabase.co";
        const SUPABASE_KEY = "sb_publishable_h83sBB7QFQwxHCspfgVXtw_byGUWSfd";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const App = () => {
            const [view, setView] = useState('auth'); 
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                supabase.auth.getSession().then(({ data: { session } }) => {
                    if (session) { setUser(session.user); setView('dashboard'); }
                    setLoading(false);
                });
            }, []);

            if (loading) return <div className="h-screen flex flex-col items-center justify-center text-teal-400 font-bold tracking-widest bg-black">
                <i className="fas fa-circle-notch fa-spin text-4xl mb-4"></i>
                SYNCHRONIZING NEURAL TERMINAL...
            </div>;

            return (
                <div className="animate-fade-in">
                    {view === 'auth' && <AuthPage onAuth={(u) => { setUser(u); setView('dashboard'); }} />}
                    {view === 'dashboard' && <Dashboard user={user} setView={setView} />}
                    {view === 'admin' && <AdminPanel user={user} setView={setView} />}
                </div>
            );
        };

        const AuthPage = ({ onAuth }) => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isRegister, setIsRegister] = useState(false);

            const handleAction = async () => {
                let result = isRegister ? await supabase.auth.signUp({ email, password }) : await supabase.auth.signInWithPassword({ email, password });
                if (result.error) alert(result.error.message);
                else onAuth(result.data.user);
            };

            return (
                <div className="h-screen flex items-center justify-center p-4 bg-black">
                    <div className="glass p-10 rounded-[2.5rem] w-full max-w-md teal-glow">
                        <div className="text-center mb-10">
                            <div className="bg-teal-500/10 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-teal-500/20">
                                <i className="fas fa-bolt text-teal-400 text-3xl"></i>
                            </div>
                            <h1 className="text-3xl font-bold tracking-tighter">LIQUID<span className="text-teal-400">GOLD</span> AI</h1>
                            <p className="text-gray-500 text-xs mt-2 uppercase tracking-widest">Neural Network Interface</p>
                        </div>
                        <div className="space-y-4">
                            <div className="space-y-1">
                                <label className="text-[10px] font-bold text-gray-500 uppercase ml-2">Access Email</label>
                                <input className="w-full p-4 rounded-2xl outline-none focus:border-teal-500/50 transition-all" placeholder="name@firm.com" value={email} onChange={e => setEmail(e.target.value)} />
                            </div>
                            <div className="space-y-1">
                                <label className="text-[10px] font-bold text-gray-500 uppercase ml-2">Secure Key</label>
                                <input className="w-full p-4 rounded-2xl outline-none focus:border-teal-500/50 transition-all" type="password" placeholder="••••••••" value={password} onChange={e => setPassword(e.target.value)} />
                            </div>
                            <button onClick={handleAction} className="w-full bg-teal-500 text-black font-black py-5 rounded-2xl hover:bg-teal-400 transition-all shadow-lg shadow-teal-500/20">
                                {isRegister ? 'INITIALIZE ACCOUNT' : 'ESTABLISH LINK'}
                            </button>
                            <p className="text-center text-xs text-gray-500 pt-4">
                                {isRegister ? 'Existing Node?' : 'New Node Required?'} 
                                <span onClick={() => setIsRegister(!isRegister)} className="text-teal-400 cursor-pointer font-bold ml-1">{isRegister ? 'Sign In' : 'Register'}</span>
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const Dashboard = ({ user, setView }) => {
            const [trades, setTrades] = useState([]);
            const [botActive, setBotActive] = useState(false);
            const [aiStatus, setAiStatus] = useState({ direction: 'ANALYZING', confidence: 0 });

            // 1. Loading Trades (Requirement)
            const fetchTrades = async () => {
                const { data, error } = await supabase
                    .from('trades')
                    .select('*')
                    .order('created_at', { ascending: false });
                if (!error) setTrades(data);
            };

            // 2. Inserting New Trade (SMC/ICT 3-Position Strategy Requirement)
            const openTradeSetup = async (type) => {
                const entryPrice = 2345.50; // Simulation of live MT5 Price
                const totalLots = 1.5; 
                
                const newPositions = [
                    { user_id: user.id, type, lots: totalLots/3, entry_price: entryPrice, tp: entryPrice + 20, sl: entryPrice - 15, status: 'OPEN' },
                    { user_id: user.id, type, lots: totalLots/3, entry_price: entryPrice, tp: entryPrice + 20, sl: entryPrice - 15, status: 'OPEN' },
                    { user_id: user.id, type, lots: totalLots/3, entry_price: entryPrice, tp: entryPrice + 50, sl: entryPrice - 15, status: 'OPEN' }
                ];

                const { error } = await supabase.from('trades').insert(newPositions);
                if (error) alert(error.message);
                fetchTrades();
            };

            // 3. Closing/Settling a Trade (Requirement)
            const settleTrade = async (id) => {
                const { error } = await supabase
                    .from('trades')
                    .update({ status: 'CLOSED', profit: (Math.random() * 800).toFixed(2) })
                    .eq('id', id);
                if (error) alert(error.message);
                fetchTrades();
            };

            useEffect(() => {
                fetchTrades();
                // Realtime subscription setup
                const tradeChannel = supabase.channel('realtime_trades')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'trades' }, () => fetchTrades())
                    .subscribe();

                const aiInterval = setInterval(() => {
                    const biases = ['BULLISH BOS', 'BEARISH CHOCH', 'LIQUIDITY GRAB'];
                    setAiStatus({ direction: biases[Math.floor(Math.random() * 3)], confidence: Math.floor(Math.random() * 10) + 89 });
                }, 6000);

                return () => { clearInterval(aiInterval); supabase.removeChannel(tradeChannel); };
            }, []);

            const totalProfit = useMemo(() => trades.reduce((acc, t) => acc + parseFloat(t.profit || 0), 0), [trades]);

            return (
                <div className="max-w-[1600px] mx-auto p-4 lg:p-8 space-y-6">
                    {/* Institutional Header */}
                    <nav className="glass rounded-3xl p-6 flex justify-between items-center border border-white/5 teal-glow">
                        <div className="flex items-center gap-4">
                            <div className="h-10 w-10 bg-teal-500 rounded-xl flex items-center justify-center shadow-lg shadow-teal-500/40">
                                <i className="fas fa-wave-square text-black"></i>
                            </div>
                            <h2 className="text-xl font-bold tracking-tighter">LIQUID<span className="text-teal-400">GOLD</span> AI</h2>
                        </div>
                        <div className="flex items-center gap-6">
                            <div className="hidden md:flex items-center gap-3">
                                <div className="status-pulse"></div>
                                <span className="text-[10px] font-black text-teal-400 uppercase tracking-[0.2em]">Neural Feed Active</span>
                            </div>
                            <button onClick={() => setBotActive(!botActive)} className={`px-8 py-2.5 rounded-xl font-black text-xs uppercase tracking-widest transition-all ${botActive ? 'bg-red-500/10 text-red-500 border border-red-500/50 active-pulse' : 'bg-teal-500 text-black'}`}>
                                {botActive ? 'TERMINATE BOT' : 'ACTIVATE ENGINE'}
                            </button>
                            <button onClick={() => setView('admin')} className="text-gray-400 hover:text-white transition-colors">
                                <i className="fas fa-sliders-h text-xl"></i>
                            </button>
                        </div>
                    </nav>

                    {/* Dashboard Stats */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <StatCard label="Trading Balance" value="$102,785.00" sub="Verified Balance" color="text-white" />
                        <StatCard label="Floating Equity" value={`$${(102785 + (totalProfit/10)).toFixed(2)}`} sub="Live Feed" color="text-teal-400" />
                        <StatCard label="Neural Confidence" value={`${aiStatus.confidence}%`} sub={aiStatus.direction} color="text-teal-400" />
                        <StatCard label="Net Profit (USD)" value={`+$${totalProfit.toLocaleString()}`} sub="Total Settled" color="text-white" />
                    </div>

                    {/* Main Analytics Grid */}
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        {/* Live Chart */}
                        <div className="lg:col-span-8 glass rounded-[2.5rem] p-8 border border-white/5">
                            <div className="flex justify-between items-center mb-8">
                                <div>
                                    <h3 className="font-bold text-lg">Neural Price Map (XAUUSD)</h3>
                                    <p className="text-xs text-gray-500">Real-time Technical Alignment</p>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => openTradeSetup('BUY')} className="bg-teal-500/10 text-teal-500 px-4 py-1.5 rounded-lg text-[10px] font-black border border-teal-500/20 hover:bg-teal-500 hover:text-black transition-all">INSTANT BUY</button>
                                    <button onClick={() => openTradeSetup('SELL')} className="bg-red-500/10 text-red-500 px-4 py-1.5 rounded-lg text-[10px] font-black border border-red-500/20 hover:bg-red-500 hover:text-white transition-all">INSTANT SELL</button>
                                </div>
                            </div>
                            <div id="priceChart" className="h-[400px]"></div>
                        </div>

                        {/* AI Engine & News */}
                        <div className="lg:col-span-4 space-y-6">
                            <div className="glass rounded-[2rem] p-8 border border-teal-500/20">
                                <h4 className="text-gray-500 text-[10px] font-black uppercase tracking-widest mb-4">AI Prediction Engine</h4>
                                <p className="text-4xl font-black text-teal-400 tracking-tighter">{aiStatus.direction}</p>
                                <div className="mt-8 space-y-3">
                                    <div className="flex justify-between text-xs font-bold uppercase tracking-wider"><span>D1 Trend:</span><span className="text-teal-400">Bullish BOS</span></div>
                                    <div className="flex justify-between text-xs font-bold uppercase tracking-wider"><span>H4 Structure:</span><span className="text-teal-400">Aligned</span></div>
                                    <div className="flex justify-between text-xs font-bold uppercase tracking-wider"><span>M15 Entry:</span><span className="text-white">OPTIMIZED</span></div>
                                </div>
                            </d
