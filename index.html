<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiquidGold AI | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
</head>
<body class="bg-black text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- UPDATE THESE TWO ---
        const SUPABASE_URL = "https://zqyextmqqlgyfmttuull.supabase.co";
        const SUPABASE_KEY = "sb_publishable_h83sBB7QFQwxHCspfgVXtw_byGUWSfd"; // Replace with 'anon public' key if this fails

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const App = () => {
            const [view, setView] = useState('loading');
            const [error, setError] = useState(null);

            useEffect(() => {
                console.log("App booting...");
                supabaseClient.auth.getSession()
                    .then(({ data, error }) => {
                        if (error) {
                            console.error("Auth error:", error);
                            setError(error.message);
                            setView('auth');
                        } else {
                            console.log("Session found:", data.session);
                            if (data.session) setView('dashboard');
                            else setView('auth');
                        }
                    })
                    .catch(err => {
                        console.error("Critical Init Error:", err);
                        setError(err.message);
                    });
            }, []);

            if (view === 'loading') return (
                <div className="h-screen flex flex-col items-center justify-center bg-black">
                    <div className="text-teal-500 animate-pulse font-bold">LINKING TO SUPABASE...</div>
                    {error && <div className="text-red-500 mt-4">Error: {error}</div>}
                </div>
            );

            return (
                <div className="p-10">
                    {view === 'auth' ? (
                        <div className="max-w-md mx-auto bg-zinc-900 p-8 rounded-3xl border border-zinc-800">
                            <h1 class="text-2xl font-bold mb-6 text-teal-400">Terminal Login</h1>
                            <p class="text-sm text-gray-400 mb-4">Check console (F12) if this doesn't respond.</p>
                            <input id="email" type="email" placeholder="Email" class="w-full p-4 bg-black border border-zinc-700 rounded-xl mb-4" />
                            <input id="pass" type="password" placeholder="Password" class="w-full p-4 bg-black border border-zinc-700 rounded-xl mb-4" />
                            <button 
                                onClick={async () => {
                                    const e = document.getElementById('email').value;
                                    const p = document.getElementById('pass').value;
                                    const { error } = await supabaseClient.auth.signInWithPassword({ email: e, password: p });
                                    if(error) alert(error.message); else window.location.reload();
                                }}
                                class="w-full bg-teal-500 text-black font-bold py-4 rounded-xl"
                            >Connect Node</button>
                        </div>
                    ) : (
                        <div>
                            <h1 className="text-4xl font-bold">Welcome to Dashboard</h1>
                            <p className="text-teal-500 mt-2">Connection Status: Stable</p>
                            <button onClick={() => supabaseClient.auth.signOut().then(() => window.location.reload())} class="mt-10 text-red-500 underline">Logout</button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <!-- Use the development version of Babel for local files -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
