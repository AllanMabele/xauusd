<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LiquidGold AI | Institutional XAUUSD Terminal</title>

<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet" />

<style>
  :root { --teal:#2dd4bf; --black:#050505; --card-bg:rgba(15,15,20,0.8); }
  body {
    background-color: var(--black); color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(45,212,191,0.06) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(45,212,191,0.04) 0%, transparent 40%);
    min-height: 100vh; overflow-x: hidden;
  }
  .glass { background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 8px 32px 0 rgba(0,0,0,0.8); }
  .teal-glow { box-shadow: 0 0 25px rgba(45,212,191,0.15); }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .status-pulse { width:10px; height:10px; border-radius:50%; background:var(--teal); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{transform:scale(.9);opacity:.7} 50%{transform:scale(1.2);opacity:1} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  .animate-fade-in { animation: fadeIn .4s ease-out; }
  input, select, textarea { background:rgba(255,255,255,.05)!important; border:1px solid rgba(255,255,255,.1)!important; color:#fff!important; }
  input:focus, textarea:focus { border-color: var(--teal)!important; outline:none; }
  ::-webkit-scrollbar { width:8px; height:8px; }
  ::-webkit-scrollbar-thumb { background:rgba(45,212,191,.2); border-radius:4px; }
  .modal-bg { background: rgba(0,0,0,.85); backdrop-filter: blur(8px); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback } = React;

const SUPABASE_URL = "https://zqyextmqqlgyfmttuull.supabase.co";
const SUPABASE_KEY = "sb_publishable_h83sBB7QFQwxHCspfgVXtw_byGUWSfd";
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const TELEGRAM_ADMIN = "LiquidM_Admin";
const MPESA_NUMBER = "0701540201";
const USDT_TRC20 = "TBr4ZsJky3ufBaA6WMFVJ7hX36Wtf29NRz";
const STORAGE_BUCKET = "ea-files";
const ADMIN_EMAIL = "allymabz@gmail.com";

const PRODUCTS = [
  { id: "liquidgold-institutional", name: "LiquidGold AI — Institutional", file: "LiquidGoldAI.mq5", price: 100,
    desc: "Multi-timeframe SMC engine (D1 / H4 / M15) with adaptive AI confidence scoring, triple-position bundles, dynamic trailing runner, news filter, and on-chart dashboard.",
    tag: "INSTITUTIONAL", icon: "fa-bolt" },
  { id: "liquidgold-scalper", name: "LiquidGold AI — M15 Scalper", file: "LiquidGoldAI_Scalper.mq5", price: 100,
    desc: "M15 scalper aligned with H4 trend. 50% risk per trade, breakeven at +40 pips, auto-exit on opposite M15 close. Live entry-condition dashboard.",
    tag: "SCALPER", icon: "fa-rocket" }
];

const App = () => {
  const [user, setUser] = useState(null);
  const [isAdmin, setIsAdmin] = useState(false);
  const [loading, setLoading] = useState(true);
  // 'catalog' (public landing) | 'auth' (login/register) | 'dashboard' (logged in)
  const [route, setRoute] = useState("catalog");
  const [authMode, setAuthMode] = useState("login"); // 'login' | 'register'
  const [pendingProduct, setPendingProduct] = useState(null);

  const checkAdmin = (u) => {
    if (!u) { setIsAdmin(false); return; }
    setIsAdmin((u.email || "").toLowerCase() === ADMIN_EMAIL);
    supabaseClient.rpc("is_admin").then(({ data, error }) => {
      if (!error && typeof data === "boolean") setIsAdmin(data);
    }).catch(() => {});
  };

  useEffect(() => {
    let mounted = true;
    const finish = (session) => {
      if (!mounted) return;
      const u = session?.user || null;
      setUser(u);
      checkAdmin(u);
      if (u) setRoute("dashboard");
      else if (route === "dashboard") setRoute("catalog");
      setLoading(false);
    };
    const { data: authListener } = supabaseClient.auth.onAuthStateChange((_e, session) => finish(session));
    supabaseClient.auth.getSession().then(({ data }) => finish(data?.session));
    const t = setTimeout(() => { if (mounted) setLoading(false); }, 3000);
    return () => { mounted = false; clearTimeout(t); authListener.subscription.unsubscribe(); };
  }, []);

  const goAuth = (mode, product = null) => {
    setAuthMode(mode);
    setPendingProduct(product);
    setRoute("auth");
  };

  if (loading) {
    return (
      <div className="min-h-screen flex items-center justify-center">
        <div className="text-center">
          <div className="status-pulse mx-auto mb-4"></div>
          <p className="mono text-teal-400 text-xs uppercase tracking-widest">INITIALIZING TERMINAL...</p>
        </div>
      </div>
    );
  }

  if (route === "auth") {
    return <AuthPage initialMode={authMode} pendingProduct={pendingProduct} onBack={() => setRoute("catalog")} />;
  }

  if (user && route === "dashboard") {
    return <Dashboard user={user} isAdmin={isAdmin} onSignOut={() => setRoute("catalog")} />;
  }

  return <PublicCatalog onLoginClick={() => goAuth("login")} onRegisterClick={() => goAuth("register")} onBuyClick={(p) => goAuth("login", p)} />;
};

/* ========== PUBLIC NAV (shared) ========== */
const PublicNav = ({ onLoginClick, onRegisterClick, user, onDashboardClick, onSignOut }) => (
  <header className="glass rounded-2xl p-4 mb-8 flex items-center justify-between flex-wrap gap-4">
    <div className="flex items-center gap-3">
      <div className="w-10 h-10 rounded-xl bg-teal-500/10 border border-teal-500/30 flex items-center justify-center">
        <i className="fa-solid fa-bolt text-teal-400"></i>
      </div>
      <div>
        <h1 className="text-lg font-bold tracking-tight">LIQUIDGOLD AI</h1>
        <p className="text-[10px] text-gray-500 uppercase tracking-widest mono">Institutional XAUUSD Terminal</p>
      </div>
    </div>
    <nav className="flex items-center gap-2">
      {user ? (
        <>
          <button onClick={onDashboardClick} className="px-4 py-2.5 rounded-xl text-xs uppercase tracking-widest text-teal-400 border border-teal-500/30 hover:bg-teal-500/10">Dashboard</button>
          <button onClick={onSignOut} className="px-4 py-2.5 rounded-xl text-xs uppercase tracking-widest text-gray-400 border border-white/10 hover:bg-white/5">Logout</button>
        </>
      ) : (
        <>
          <button onClick={onLoginClick} className="px-4 py-2.5 rounded-xl text-xs uppercase tracking-widest text-gray-300 border border-white/10 hover:bg-white/5">Login</button>
          <button onClick={onRegisterClick} className="px-4 py-2.5 rounded-xl text-xs font-black uppercase tracking-widest bg-teal-500 hover:bg-teal-400 text-black">Register</button>
        </>
      )}
    </nav>
  </header>
);

/* ========== PUBLIC CATALOG (no auth required to view) ========== */
const PublicCatalog = ({ onLoginClick, onRegisterClick, onBuyClick }) => {
  return (
    <div className="max-w-6xl mx-auto px-4 py-8">
      <PublicNav onLoginClick={onLoginClick} onRegisterClick={onRegisterClick} />

      <section className="mb-10 text-center">
        <h2 className="text-4xl md:text-5xl font-bold tracking-tight">Institutional XAUUSD Arsenal</h2>
        <p className="text-teal-400 mono uppercase tracking-widest text-xs mt-3">Two engines. One edge.</p>
        <p className="text-gray-400 max-w-2xl mx-auto mt-4">Production-ready MT5 Expert Advisors engineered for XAUUSD. Pay once per EA, confirm your transaction, and download the compiled .mq5 source instantly.</p>
      </section>

      <div className="grid md:grid-cols-2 gap-6">
        {PRODUCTS.map(p => (
          <div key={p.id} className="glass rounded-2xl p-6 teal-glow animate-fade-in">
            <div className="flex items-start justify-between mb-4">
              <div className="w-12 h-12 rounded-xl bg-teal-500/10 border border-teal-500/30 flex items-center justify-center">
                <i className={`fa-solid ${p.icon} text-teal-400 text-xl`}></i>
              </div>
              <span className="text-[10px] mono uppercase tracking-widest text-teal-400 border border-teal-500/30 px-2 py-1 rounded">{p.tag}</span>
            </div>
            <h3 className="text-xl font-bold">{p.name}</h3>
            <p className="text-xs mono text-gray-500 mt-1">{p.file}</p>
            <p className="text-sm text-gray-400 mt-3">{p.desc}</p>
            <div className="flex items-end justify-between mt-6">
              <div>
                <p className="text-[10px] uppercase tracking-widest text-gray-500">Unlock</p>
                <p className="text-2xl font-bold text-teal-400">${p.price}</p>
              </div>
              <button onClick={() => onBuyClick(p)} className="px-5 py-2.5 rounded-xl bg-teal-500 hover:bg-teal-400 text-black font-black uppercase text-xs tracking-widest">
                Buy Now
              </button>
            </div>
          </div>
        ))}
      </div>

      <p className="text-center text-gray-500 text-xs mt-10">Login or register to purchase and download.</p>
    </div>
  );
};

/* ========== AUTH PAGE ========== */
const AuthPage = ({ initialMode = "login", pendingProduct, onBack }) => {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [register, setRegister] = useState(initialMode === "register");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [info, setInfo] = useState("");

  const handleAuth = async (e) => {
    e?.preventDefault();
    setError(""); setInfo("");
    if (!email || !password) return setError("Email and password are required");
    try {
      setLoading(true);
      const res = register
        ? await supabaseClient.auth.signUp({ email, password, options: { emailRedirectTo: window.location.origin } })
        : await supabaseClient.auth.signInWithPassword({ email, password });
      if (res.error) setError(res.error.message);
      else if (register && !res.data.session) setInfo("Check your email to confirm your account.");
    } catch (err) { setError(err.message || "Unknown error"); }
    finally { setLoading(false); }
  };

  return (
    <div className="min-h-screen flex items-center justify-center p-4">
      <div className="glass rounded-2xl p-8 max-w-md w-full teal-glow animate-fade-in">
        <button onClick={onBack} className="text-xs uppercase tracking-widest text-gray-500 hover:text-teal-400 mb-4">
          <i className="fa-solid fa-arrow-left mr-2"></i>Back to catalog
        </button>
        <div className="text-center mb-6">
          <div className="w-14 h-14 mx-auto rounded-2xl bg-teal-500/10 border border-teal-500/30 flex items-center justify-center mb-3">
            <i className="fa-solid fa-bolt text-teal-400 text-2xl"></i>
          </div>
          <h1 className="text-2xl font-bold tracking-tight">LIQUIDGOLD AI</h1>
          <p className="text-teal-400 mono uppercase tracking-widest text-xs mt-1">Neural Execution Link</p>
          {pendingProduct && (
            <p className="text-gray-400 text-xs mt-3">Sign in to purchase <span className="text-teal-400">{pendingProduct.name}</span></p>
          )}
        </div>

        <form onSubmit={handleAuth} className="space-y-4">
          <div>
            <label className="text-[10px] uppercase tracking-widest text-gray-500">Node ID (Email)</label>
            <input type="email" placeholder="trader@firm.com" className="w-full p-3 rounded-xl mt-1"
              value={email} onChange={(e) => setEmail(e.target.value)} autoComplete="email" />
          </div>
          <div>
            <label className="text-[10px] uppercase tracking-widest text-gray-500">Secure Key</label>
            <input type="password" placeholder="••••••••" className="w-full p-3 rounded-xl mt-1"
              value={password} onChange={(e) => setPassword(e.target.value)}
              autoComplete={register ? "new-password" : "current-password"} />
          </div>

          {error && <p className="text-red-400 text-xs">{error}</p>}
          {info && <p className="text-teal-400 text-xs">{info}</p>}

          <button type="submit" disabled={loading} className="w-full py-3 rounded-xl bg-teal-500 hover:bg-teal-400 text-black font-black uppercase text-xs tracking-widest disabled:opacity-50">
            {loading ? "ESTABLISHING..." : register ? "INITIALIZE ACCOUNT" : "ESTABLISH LINK"}
          </button>
          <button type="button" onClick={() => { setRegister(!register); setError(""); setInfo(""); }}
            className="w-full text-gray-500 text-xs uppercase tracking-widest mt-2 hover:text-teal-400 transition">
            {register ? "Existing Node? Sign In" : "Request Institutional Access"}
          </button>
        </form>
      </div>
    </div>
  );
};

/* ========== DASHBOARD (auth required) ========== */
const Dashboard = ({ user, isAdmin, onSignOut }) => {
  const [view, setView] = useState("user");
  const [payments, setPayments] = useState([]);
  const [activeProduct, setActiveProduct] = useState(null);

  const fetchPayments = useCallback(async () => {
    const { data } = await supabaseClient
      .from("payments").select("*")
      .eq("user_id", user.id)
      .order("created_at", { ascending: false });
    setPayments(data || []);
  }, [user.id]);

  useEffect(() => {
    fetchPayments();
    const ch = supabaseClient
      .channel("user-payments")
      .on("postgres_changes", { event: "*", schema: "public", table: "payments", filter: `user_id=eq.${user.id}` }, () => fetchPayments())
      .subscribe();
    return () => supabaseClient.removeChannel(ch);
  }, [fetchPayments, user.id]);

  const statusFor = (productId) => payments.find(p => p.product_id === productId)?.status || null;

  return (
    <div className="max-w-6xl mx-auto px-4 py-8">
      <header className="glass rounded-2xl p-4 mb-8 flex items-center justify-between flex-wrap gap-4">
        <div className="flex items-center gap-3">
          <div className="w-10 h-10 rounded-xl bg-teal-500/10 border border-teal-500/30 flex items-center justify-center">
            <i className="fa-solid fa-bolt text-teal-400"></i>
          </div>
          <div>
            <h1 className="text-lg font-bold tracking-tight">LIQUIDGOLD AI</h1>
            <p className="text-[10px] text-gray-500 uppercase tracking-widest mono">{user.email}{isAdmin && <span className="text-teal-400"> · ADMIN</span>}</p>
          </div>
        </div>
        <div className="flex items-center gap-2 flex-wrap">
          {isAdmin && (
            <button onClick={() => setView(view === "admin" ? "user" : "admin")}
              className="px-4 py-2.5 rounded-xl text-xs uppercase tracking-widest text-teal-400 border border-teal-500/30 hover:bg-teal-500/10">
              {view === "admin" ? "User View" : "Admin Panel"}
            </button>
          )}
          <div className="flex items-center gap-2 px-3 py-2 rounded-xl border border-teal-500/20">
            <span className="status-pulse"></span>
            <span className="text-[10px] mono uppercase tracking-widest text-teal-400">Vault Online</span>
          </div>
          <button onClick={async () => { await supabaseClient.auth.signOut(); onSignOut && onSignOut(); }}
            className="px-4 py-2.5 rounded-xl text-xs uppercase tracking-widest text-gray-400 border border-white/10 hover:bg-white/5">
            Logout
          </button>
        </div>
      </header>

      {view === "admin" && isAdmin ? (
        <AdminPanel />
      ) : (
        <>
          <section className="mb-10 text-center">
            <h2 className="text-4xl md:text-5xl font-bold tracking-tight">Institutional XAUUSD Arsenal</h2>
            <p className="text-teal-400 mono uppercase tracking-widest text-xs mt-3">Two engines. One edge.</p>
            <p className="text-gray-400 max-w-2xl mx-auto mt-4">Pay once per EA, confirm your transaction, and download the compiled .mq5 source instantly.</p>
          </section>

          <div className="grid md:grid-cols-2 gap-6">
            {PRODUCTS.map(p => {
              const status = statusFor(p.id);
              return (
                <div key={p.id} className="glass rounded-2xl p-6 teal-glow animate-fade-in">
                  <div className="flex items-start justify-between mb-4">
                    <div className="w-12 h-12 rounded-xl bg-teal-500/10 border border-teal-500/30 flex items-center justify-center">
                      <i className={`fa-solid ${p.icon} text-teal-400 text-xl`}></i>
                    </div>
                    <span className="text-[10px] mono uppercase tracking-widest text-teal-400 border border-teal-500/30 px-2 py-1 rounded">{p.tag}</span>
                  </div>
                  <h3 className="text-xl font-bold">{p.name}</h3>
                  <p className="text-xs mono text-gray-500 mt-1">{p.file}</p>
                  <p className="text-sm text-gray-400 mt-3">{p.desc}</p>
                  <div className="flex items-end justify-between mt-6">
                    <div>
                      <p className="text-[10px] uppercase tracking-widest text-gray-500">Unlock</p>
                      <p className="text-2xl font-bold text-teal-400">${p.price}</p>
                    </div>
                    <StatusBadge status={status} />
                  </div>
                  <div className="mt-5">
                    <ProductAction status={status} onUnlock={() => setActiveProduct(p)} product={p} user={user} />
                  </div>
                </div>
              );
            })}
          </div>

          <PaymentHistory payments={payments} />

          {activeProduct && (
            <PaymentModal product={activeProduct} user={user}
              existing={payments.find(p => p.product_id === activeProduct.id && p.status !== 'REJECTED')}
              onClose={() => setActiveProduct(null)} />
          )}
        </>
      )}
    </div>
  );
};

const StatusBadge = ({ status }) => {
  if (!status) return <span className="text-[10px] mono uppercase tracking-widest text-gray-500 border border-white/10 px-2 py-1 rounded">Locked</span>;
  const map = {
    PENDING:  ["text-yellow-400", "bg-yellow-500/10", "border-yellow-500/30", "Awaiting Confirmation"],
    APPROVED: ["text-teal-400",   "bg-teal-500/10",   "border-teal-500/30",   "Unlocked"],
    REJECTED: ["text-red-400",    "bg-red-500/10",    "border-red-500/30",    "Rejected"],
  };
  const [c,b,br,t] = map[status] || map.PENDING;
  return <span className={`text-[10px] mono uppercase tracking-widest ${c} ${b} border ${br} px-2 py-1 rounded`}>{t}</span>;
};

const ProductAction = ({ status, onUnlock, product }) => {
  const [busy, setBusy] = useState(false);
  const download = async () => {
    setBusy(true);
    try {
      const { data, error } = await supabaseClient.storage.from(STORAGE_BUCKET).createSignedUrl(product.file, 60);
      if (error) throw error;
      window.open(data.signedUrl, "_blank");
    } catch (e) {
      alert("Download unavailable: " + e.message);
    } finally { setBusy(false); }
  };
  if (status === 'APPROVED') {
    return <button onClick={download} disabled={busy} className="w-full py-2.5 rounded-xl bg-teal-500 hover:bg-teal-400 text-black font-black uppercase text-xs tracking-widest disabled:opacity-50">{busy ? "Preparing..." : "Download .mq5"}</button>;
  }
  if (status === 'PENDING') {
    return <button onClick={onUnlock} className="w-full py-2.5 rounded-xl border border-yellow-500/40 text-yellow-400 hover:bg-yellow-500/10 font-black uppercase text-xs tracking-widest">View Pending Confirmation</button>;
  }
  return <button onClick={onUnlock} className="w-full py-2.5 rounded-xl bg-teal-500 hover:bg-teal-400 text-black font-black uppercase text-xs tracking-widest">Unlock for $100</button>;
};

/* ========== ADMIN PANEL ========== */
const AdminPanel = () => {
  const [rows, setRows] = useState([]);
  const [filter, setFilter] = useState("PENDING");
  const [loading, setLoading] = useState(true);
  const [busyId, setBusyId] = useState(null);
  const [error, setError] = useState("");

  const fetchAll = useCallback(async () => {
    setLoading(true); setError("");
    let q = supabaseClient.from("payments").select("*").order("created_at", { ascending: false });
    if (filter !== "ALL") q = q.eq("status", filter);
    const { data, error } = await q;
    if (error) setError(error.message);
    setRows(data || []);
    setLoading(false);
  }, [filter]);

  useEffect(() => {
    fetchAll();
    const ch = supabaseClient
      .channel("admin-payments")
      .on("postgres_changes", { event: "*", schema: "public", table: "payments" }, () => fetchAll())
      .subscribe();
    return () => supabaseClient.removeChannel(ch);
  }, [fetchAll]);

  const setStatus = async (row, status) => {
    setBusyId(row.id); setError("");
    const { error } = await supabaseClient.from("payments").update({ status }).eq("id", row.id);
    if (error) setError(error.message);
    setBusyId(null);
  };

  return (
    <div className="glass rounded-2xl p-6">
      <div className="flex items-center justify-between flex-wrap gap-3 mb-5">
        <div>
          <h2 className="text-xl font-bold">Admin · Payment Approvals</h2>
          <p className="text-[10px] mono uppercase tracking-widest text-gray-500">Approve or reject buyer transactions</p>
        </div>
        <div className="flex gap-2 flex-wrap">
          {["PENDING","APPROVED","REJECTED","ALL"].map(f => (
            <button key={f} onClick={() => setFilter(f)}
              className={`px-3 py-2 rounded-lg text-[10px] font-black tracking-widest uppercase border ${filter===f ? "bg-teal-500 text-black border-teal-500" : "border-white/10 text-gray-400 hover:text-white"}`}>
              {f}
            </button>
          ))}
        </div>
      </div>

      {error && <p className="text-red-400 text-xs mb-3">{error}</p>}

      {loading ? (
        <p className="text-gray-500 text-sm">Loading...</p>
      ) : rows.length === 0 ? (
        <p className="text-gray-500 text-sm">No records.</p>
      ) : (
        <div className="overflow-x-auto">
          <table className="w-full text-xs">
            <thead className="text-gray-500 uppercase tracking-widest">
              <tr>
                <th className="text-left p-2">User</th>
                <th className="text-left p-2">Product</th>
                <th className="text-left p-2">Method</th>
                <th className="text-left p-2">Tx Code</th>
                <th className="text-left p-2">Amount</th>
                <th className="text-left p-2">Status</th>
                <th className="text-left p-2">Date</th>
                <th className="text-left p-2">Actions</th>
              </tr>
            </thead>
            <tbody>
              {rows.map(r => (
                <tr key={r.id} className="border-t border-white/5">
                  <td className="p-2 mono text-gray-300">{r.user_email}</td>
                  <td className="p-2">{r.product_name}</td>
                  <td className="p-2">{r.method}</td>
                  <td className="p-2 mono text-teal-400">{r.tx_code}</td>
                  <td className="p-2">${r.amount}</td>
                  <td className="p-2"><StatusBadge status={r.status} /></td>
                  <td className="p-2 text-gray-500">{new Date(r.created_at).toLocaleString()}</td>
                  <td className="p-2">
                    <div className="flex gap-2">
                      <button disabled={busyId===r.id} onClick={() => setStatus(r, 'APPROVED')}
                        className="px-3 py-1.5 rounded-lg bg-teal-500 hover:bg-teal-400 text-black font-black uppercase text-[10px] tracking-widest disabled:opacity-40">Approve</button>
                      <button disabled={busyId===r.id} onClick={() => setStatus(r, 'REJECTED')}
                        className="px-3 py-1.5 rounded-lg border border-red-500/40 text-red-400 hover:bg-red-500/10 font-black uppercase text-[10px] tracking-widest disabled:opacity-40">Reject</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
};

/* ========== PAYMENT MODAL ========== */
const PaymentModal = ({ product, user, existing, onClose }) => {
  const [method, setMethod] = useState("MPESA");
  const [txCode, setTxCode] = useState(existing?.tx_code || "");
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState("");
  const [done, setDone] = useState(!!existing);

  const copy = (txt) => {
    navigator.clipboard.writeText(txt).then(() => {
      const el = document.getElementById("copy-toast");
      if (el) { el.style.opacity = 1; setTimeout(() => el.style.opacity = 0, 1500); }
    });
  };

  const submit = async (e) => {
    e.preventDefault();
    setError("");
    if (!txCode.trim() || txCode.trim().length < 6) return setError("Enter the full transaction code from your payment confirmation.");
    setSubmitting(true);
    const payload = {
      user_id: user.id, user_email: user.email, product_id: product.id, product_name: product.name,
      amount: product.price, method, tx_code: txCode.trim(), status: "PENDING",
    };
    const { error } = await supabaseClient.from("payments").upsert(payload, { onConflict: "user_id,product_id" });
    if (error) { setError(error.message); setSubmitting(false); return; }
    const msg = encodeURIComponent(
      `🟢 NEW PAYMENT — LiquidGold AI\nProduct: ${product.name}\nAmount: $${product.price}\nMethod: ${method}\nTx Code: ${txCode.trim()}\nUser: ${user.email}\nUser ID: ${user.id}`
    );
    window.open(`https://t.me/${TELEGRAM_ADMIN}?text=${msg}`, "_blank");
    setDone(true); setSubmitting(false);
  };

  return (
    <div className="fixed inset-0 modal-bg flex items-center justify-center p-4 z-50" onClick={onClose}>
      <div className="glass rounded-2xl p-6 max-w-md w-full teal-glow animate-fade-in relative" onClick={(e) => e.stopPropagation()}>
        <button onClick={onClose} className="absolute top-3 right-3 text-gray-500 hover:text-white"><i className="fa-solid fa-xmark"></i></button>
        <h3 className="text-xl font-bold">Unlock Access</h3>
        <p className="text-sm text-teal-400">{product.name}</p>
        <p className="text-xs text-gray-500 mono">${product.price} · {product.file}</p>

        {done ? (
          <div className="text-center mt-6">
            <div className="w-14 h-14 mx-auto rounded-2xl bg-teal-500/10 border border-teal-500/30 flex items-center justify-center mb-3">
              <i className="fa-solid fa-check text-teal-400 text-xl"></i>
            </div>
            <h4 className="text-lg font-bold">Payment Submitted</h4>
            <p className="text-sm text-gray-400 mt-2">Your transaction code is being reviewed. You will see "Unlocked" and a download button on this page once admin approves it.</p>
            <a href={`https://t.me/${TELEGRAM_ADMIN}`} target="_blank" rel="noreferrer" className="inline-block mt-4 px-4 py-2 rounded-xl border border-teal-500/30 text-teal-400 hover:bg-teal-500/10 text-xs uppercase tracking-widest">Message admin on Telegram</a>
          </div>
        ) : (
          <form onSubmit={submit} className="space-y-4 mt-5">
            <div className="grid grid-cols-2 gap-2 p-1 rounded-xl border border-white/10">
              {["MPESA", "USDT_TRC20"].map(m => (
                <button type="button" key={m} onClick={() => setMethod(m)}
                  className={`py-2.5 rounded-lg text-xs font-black tracking-widest transition ${method===m ? "bg-teal-500 text-black" : "text-gray-400 hover:text-white"}`}>
                  {m === "MPESA" ? "M-PESA" : "USDT TRC20"}
                </button>
              ))}
            </div>

            {method === "MPESA" ? (
              <div className="p-4 rounded-xl border border-white/10">
                <p className="text-[10px] uppercase tracking-widest text-gray-500">Send $100 (KES equivalent) to</p>
                <div className="flex items-center justify-between mt-1">
                  <p className="mono text-teal-400 text-lg">{MPESA_NUMBER}</p>
                  <button type="button" onClick={() => copy(MPESA_NUMBER)} className="text-xs text-gray-400 hover:text-teal-400 uppercase tracking-widest">Copy</button>
                </div>
                <p className="text-xs text-gray-500 mt-2">Then paste the M-Pesa confirmation code (e.g. SEK4XYZ123) below.</p>
              </div>
            ) : (
              <div className="p-4 rounded-xl border border-white/10">
                <p className="text-[10px] uppercase tracking-widest text-gray-500">Send $100 USDT (TRC20) to</p>
                <div className="flex items-center justify-between gap-2 mt-1">
                  <p className="mono text-teal-400 text-xs break-all">{USDT_TRC20}</p>
                  <button type="button" onClick={() => copy(USDT_TRC20)} className="text-xs text-gray-400 hover:text-teal-400 uppercase tracking-widest shrink-0">Copy</button>
                </div>
                <p className="text-xs text-gray-500 mt-2">Then paste the on-chain transaction hash (TxID) below.</p>
              </div>
            )}

            <div>
              <label className="text-[10px] uppercase tracking-widest text-gray-500">Transaction Code / TxID</label>
              <input type="text" value={txCode} onChange={(e) => setTxCode(e.target.value)}
                placeholder={method === "MPESA" ? "e.g. SEK4XYZ123" : "e.g. 0xabc...def"}
                className="w-full p-4 rounded-xl outline-none mono text-sm" />
            </div>

            {error && <p className="text-red-400 text-xs">{error}</p>}

            <button type="submit" disabled={submitting} className="w-full py-3 rounded-xl bg-teal-500 hover:bg-teal-400 text-black font-black uppercase text-xs tracking-widest disabled:opacity-50">
              {submitting ? "Submitting..." : "Confirm Payment"}
            </button>
            <p className="text-[10px] text-gray-500 text-center">
              On submit, an alert is sent to <span className="text-teal-400">@{TELEGRAM_ADMIN}</span> on Telegram. Access unlocks once verified.
            </p>
          </form>
        )}

        <div id="copy-toast" className="fixed bottom-6 left-1/2 -translate-x-1/2 px-4 py-2 rounded-xl bg-teal-500 text-black text-xs font-black uppercase tracking-widest opacity-0 transition-opacity">
          Copied
        </div>
      </div>
    </div>
  );
};

const PaymentHistory = ({ payments }) => (
  <div className="glass rounded-2xl p-6 mt-8">
    <div className="flex items-center justify-between mb-4">
      <h3 className="text-lg font-bold">Payment Ledger</h3>
      <span className="text-[10px] mono uppercase tracking-widest text-gray-500">{payments.length} RECORDS</span>
    </div>
    {payments.length === 0 ? (
      <p className="text-gray-500 text-sm">No payments submitted</p>
    ) : (
      <div className="overflow-x-auto">
        <table className="w-full text-xs">
          <thead className="text-gray-500 uppercase tracking-widest">
            <tr>
              <th className="text-left p-2">Product</th>
              <th className="text-left p-2">Method</th>
              <th className="text-left p-2">Tx Code</th>
              <th className="text-left p-2">Amount</th>
              <th className="text-left p-2">Status</th>
              <th className="text-left p-2">Date</th>
            </tr>
          </thead>
          <tbody>
            {payments.map(p => (
              <tr key={p.id} className="border-t border-white/5">
                <td className="p-2">{p.product_name}</td>
                <td className="p-2">{p.method}</td>
                <td className="p-2 mono text-teal-400">{p.tx_code}</td>
                <td className="p-2">${p.amount}</td>
                <td className="p-2"><StatusBadge status={p.status} /></td>
                <td className="p-2 text-gray-500">{new Date(p.created_at).toLocaleString()}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    )}
  </div>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
