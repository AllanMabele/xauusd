<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiquidGold AI | Institutional XAUUSD Terminal</title>
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        :root { --teal: #2dd4bf; --black: #050505; --card-bg: rgba(15, 15, 20, 0.8); }
        body { background-color: var(--black); color: #ffffff; font-family: 'Space Grotesk', sans-serif; background-image: radial-gradient(circle at 10% 20%, rgba(45, 212, 191, 0.05) 0%, transparent 40%); min-height: 100vh; overflow-x: hidden; }
        .glass { background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); }
        .teal-glow { box-shadow: 0 0 25px rgba(45, 212, 191, 0.15); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .status-pulse { width: 10px; height: 10px; border-radius: 50%; background: var(--teal); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(0.9); opacity: 0.7; } 50% { transform: scale(1.2); opacity: 1; } }
        input, select { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- LOAD BABEL FIRST -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        /* ==============================
           SUPABASE CONFIG
        ================================= */
        const SUPABASE_URL = "https://zqyextmqqlgyfmttuull.supabase.co";
        const SUPABASE_KEY = "sb_publishable_h83sBB7QFQwxHCspfgVXtw_byGUWSfd";

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        /* ==============================
           APP ENTRY
        ================================= */
        const App = () => {
            const [view, setView] = useState("auth");
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const init = async () => {
                    const { data } = await supabaseClient.auth.getSession();
                    if(data?.session) {
                        setUser(data.session.user);
                        setView("dashboard");
                    }
                    setLoading(false);
                };
                init();

                const { data: authListener } = supabaseClient.auth.onAuthStateChange((event, session) => {
                    if(session) {
                        setUser(session.user);
                        setView("dashboard");
                    } else {
                        setUser(null);
                        setView("auth");
                    }
                });

                return () => authListener.subscription.unsubscribe();
            }, []);

            if(loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-black text-teal-400 font-bold tracking-widest">
                    <i className="fas fa-circle-notch fa-spin text-3xl mb-4"></i>
                    INITIALIZING TERMINAL...
                </div>
            );

            return (
                <div className="animate-fade-in">
                    {view === "auth" ? <AuthPage /> : <Dashboard user={user} setView={setView} />}
                </div>
            );
        };

        /* ==============================
           AUTH PAGE (Institutional UI)
        ================================= */
        const AuthPage = () => {
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [register, setRegister] = useState(false);
            const [loading, setLoading] = useState(false);

            const handleAuth = async () => {
                try {
                    setLoading(true);
                    const response = register 
                        ? await supabaseClient.auth.signUp({ email, password }) 
                        : await supabaseClient.auth.signInWithPassword({ email, password });
                    if(response.error) alert(response.error.message);
                } catch(err) { console.log(err); } 
                finally { setLoading(false); }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-5">
                    <div className="glass w-full max-w-md p-10 rounded-[2.5rem] teal-glow text-center">
                        <div className="bg-teal-500/10 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 border border-teal-500/20">
                            <i className="fas fa-bolt text-teal-400 text-3xl"></i>
                        </div>
                        <h1 className="text-3xl font-bold tracking-tighter mb-2">
                            LIQUID<span className="text-teal-400">GOLD</span> AI
                        </h1>
                        <p className="text-gray-500 text-xs uppercase tracking-widest mb-8">Neural Execution Link</p>

                        <div className="space-y-4 text-left">
                            <div className="space-y-1">
                                <label className="text-[10px] font-bold text-gray-500 uppercase ml-2">Node ID (Email)</label>
                                <input className="w-full p-4 rounded-xl outline-none" placeholder="name@firm.com" value={email} onChange={(e)=>setEmail(e.target.value)} />
                            </div>
                            <div className="space-y-1">
                                <label className="text-[10px] font-bold text-gray-500 uppercase ml-2">Secure Key</label>
                                <input type="password" className="w-full p-4 rounded-xl outline-none" placeholder="••••••••" value={password} onChange={(e)=>setPassword(e.target.value)} />
                            </div>
                            <button onClick={handleAuth} disabled={loading} className="w-full bg-teal-400 text-black font-black p-5 rounded-xl transition-all hover:bg-teal-300">
                                {loading ? "ESTABLISHING..." : register ? "INITIALIZE ACCOUNT" : "ESTABLISH LINK"}
                            </button>
                            <button className="w-full text-teal-400 text-xs font-bold uppercase tracking-widest mt-4" onClick={()=>setRegister(!register)}>
                                {register ? "Existing Node? Sign In" : "Request Institutional Access"}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        /* ==============================
           DASHBOARD (Institutional UI)
        ================================= */
        const Dashboard = ({ user, setView }) => {
            const [trades, setTrades] = useState([]);
            const [botActive, setBotActive] = useState(false);
            const [goldPrice, setGoldPrice] = useState(2345.50);
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            const fetchTrades = async () => {
                const { data, error } = await supabaseClient.from("trades").select("*").order("created_at", { ascending:false });
                if(!error) setTrades(data);
            };

            // Real-time Price Simulation
            useEffect(() => {
                const interval = setInterval(() => {
                    setGoldPrice(prev => Number((prev + (Math.random() - 0.5) * 1.5).toFixed(2)));
                }, 2000);
                return () => clearInterval(interval);
            }, []);

            // Real-time Trade Updates
            useEffect(() => {
                fetchTrades();
                const channel = supabaseClient.channel("live-trades").on("postgres_changes", { event:"*", schema:"public", table:"trades" }, ()=>fetchTrades()).subscribe();
                return () => supabaseClient.removeChannel(channel);
            }, []);

            // Chart Initialization & Live Updates
            useEffect(() => {
                if(!chartRef.current) return;
                const options = {
                    chart: { type: "area", height: 350, background: "transparent", toolbar: { show: false }, animations: { enabled: true, easing: 'linear', dynamicAnimation: { speed: 1000 } } },
                    theme: { mode: "dark" },
                    series: [{ name: "XAUUSD", data: [] }],
                    colors: ["#2dd4bf"],
                    fill: { type: "gradient", gradient: { opacityFrom: 0.2, opacityTo: 0 } },
                    stroke: { curve: "smooth", width: 2 },
                    grid: { borderColor: "rgba(255,255,255,0.05)" },
                    xaxis: { labels: { show: false }, axisBorder: { show: false } },
                    yaxis: { labels: { style: { colors: "#444", fontFamily: 'JetBrains Mono' } } }
                };
                chartInstance.current = new ApexCharts(chartRef.current, options);
                chartInstance.current.render();
                return () => chartInstance.current.destroy();
            }, []);

            useEffect(() => {
                if(!chartInstance.current) return;
                const existing = chartInstance.current.w.config.series[0].data;
                const updated = [...existing, goldPrice].slice(-30);
                chartInstance.current.updateSeries([{ data: updated }]);
            }, [goldPrice]);

            const createTrade = async (type) => {
                if(!botActive) return alert("System Offline: Activate Neural Engine First");
                const entry = goldPrice;
                const positions = [
                    { user_id:user.id, type, symbol:"XAUUSD", lots:0.5, entry_price:entry, tp:entry + 20, sl:entry - 10, status: 'OPEN' },
                    { user_id:user.id, type, symbol:"XAUUSD", lots:0.5, entry_price:entry, tp:entry + 20, sl:entry - 10, status: 'OPEN' },
