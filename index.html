<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiquidGold AI | Institutional Trading Platform</title>
    
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(18, 18, 18, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .teal-glow {
            box-shadow: 0 0 20px rgba(45, 212, 191, 0.15);
        }

        .active-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Supabase Client Connection ---
        const SUPABASE_URL = "https://gsivamaidhdjcrtzedmp.supabase.co";
        const SUPABASE_KEY = "sb_publishable_TqiZkP7rouOFK3zNjBT8Ig_5uOuH1ha";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const Dashboard = () => {
            const [botActive, setBotActive] = useState(false);
            const [loading, setLoading] = useState(true);
            const [user, setUser] = useState(null);
            const [stats, setStats] = useState({
                balance: 100000.00,
                equity: 102785.00,
                profit: 2785.00,
                winRate: 68
            });

            const [aiPrediction, setAiPrediction] = useState({
                direction: "NEUTRAL",
                confidence: 0,
                sentiment: "Calculating..."
            });

            useEffect(() => {
                const init = async () => {
                    // AI Engine Simulation (Logic from your ai_engine.py)
                    const directions = ["BUY", "SELL", "HOLD"];
                    setInterval(() => {
                        setAiPrediction({
                            direction: directions[Math.floor(Math.random() * 3)],
                            confidence: Math.floor(Math.random() * (98 - 75 + 1) + 75),
                            sentiment: Math.random() > 0.5 ? "Bullish" : "Bearish"
                        });
                    }, 5000);

                    setLoading(false);
                    renderMainChart();
                };
                init();
            }, []);

            const toggleBot = () => {
                setBotActive(!botActive);
                // Logic from your trading_logic.py
                console.log(botActive ? "Stopping Trading RL Engine..." : "Activating XAUUSD Neural Network...");
            };

            const renderMainChart = () => {
                const options = {
                    series: [{
                        name: 'XAUUSD',
                        data: [2010, 2015, 2008, 2025, 2034, 2030, 2045, 2042, 2055]
                    }],
                    chart: {
                        type: 'area',
                        height: 350,
                        toolbar: { show: false },
                        animations: { enabled: true }
                    },
                    colors: ['#2dd4bf'],
                    fill: {
                        type: 'gradient',
                        gradient: { shadeIntensity: 1, opacityFrom: 0.4, opacityTo: 0, stops: [0, 90, 100] }
                    },
                    dataLabels: { enabled: false },
                    stroke: { curve: 'smooth', width: 2 },
                    grid: { borderColor: '#1f2937', strokeDashArray: 3 },
                    xaxis: { labels: { style: { colors: '#9ca3af' } } },
                    yaxis: { labels: { style: { colors: '#9ca3af' } } },
                    tooltip: { theme: 'dark' }
                };

                const chart = new ApexCharts(document.querySelector("#main-chart"), options);
                chart.render();
            };

            if (loading) return <div className="h-screen flex items-center justify-center text-teal-500 font-bold">BOOTING NEURAL ENGINE...</div>;

            return (
                <div className="min-h-screen p-4 lg:p-8 space-y-8 max-w-[1600px] mx-auto">
                    
                    {/* Header */}
                    <nav className="flex justify-between items-center glass p-6 rounded-3xl teal-glow">
                        <div className="flex items-center gap-3">
                            <div className="bg-teal-500 p-2 rounded-xl">
                                <i className="fas fa-microchip text-black text-xl"></i>
                            </div>
                            <h1 className="text-2xl font-bold tracking-tight">LIQUID<span className="text-teal-400">GOLD</span> AI</h1>
                        </div>
                        
                        <div className="flex items-center gap-6">
                            <div className="hidden md:block text-right">
                                <p className="text-xs text-gray-500 uppercase font-bold">System Status</p>
                                <p className="text-sm text-teal-400 font-semibold flex items-center gap-2">
                                    <span className="w-2 h-2 bg-teal-500 rounded-full active-pulse"></span>
                                    AI Nodes Synchronized
                                </p>
                            </div>
                            <button 
                                onClick={toggleBot}
                                className={`px-8 py-3 rounded-2xl font-bold transition-all duration-500 ${botActive ? 'bg-red-500/20 text-red-500 border border-red-500' : 'bg-teal-500 text-black teal-glow shadow-lg'}`}
                            >
                                {botActive ? 'DEACTIVATE BOT' : 'ACTIVATE AI BOT'}
                            </button>
                        </div>
                    </nav>

                    {/* Stats Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <StatCard label="Account Balance" value={`$${stats.balance.toLocaleString()}`} icon="fa-wallet" color="text-white" />
                        <StatCard label="Equity (Floating)" value={`$${stats.equity.toLocaleString()}`} icon="fa-chart-line" color="text-teal-400" />
                        <StatCard label="Neural Win Rate" value={`${stats.winRate}%`} icon="fa-brain" color="text-white" />
                        <StatCard label="Net Profit" value={`+$${stats.profit.toLocaleString()}`} icon="fa-plus-circle" color="text-teal-400" />
                    </div>

                    {/* Main Content */}
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        
                        {/* Chart Area */}
                        <div className="lg:col-span-8 glass p-8 rounded-[2.5rem]">
                            <div className="flex justify-between items-center mb-8">
                                <h2 className="text-xl font-bold">XAUUSD Technical Analysis</h2>
                                <div className="flex gap-2">
                                    <button className="px-4 py-1 rounded-lg bg-white/5 text-xs font-bold border border-white/10 hover:bg-teal-500 hover:text-black transition-all">M15</button>
                                    <button className="px-4 py-1 rounded-lg bg-white/5 text-xs font-bold border border-white/10 hover:bg-teal-500 hover:text-black transition-all">H4</button>
                                    <button className="px-4 py-1 rounded-lg bg-teal-500 text-black text-xs font-bold">D1</button>
                                </div>
                            </div>
                            <div id="main-chart"></div>
                        </div>

                        {/* AI Engine Panel */}
                        <div className="lg:col-span-4 space-y-8">
                            
                            {/* Prediction Panel */}
                            <div className="glass p-8 rounded-[2.5rem] border-teal-500/30">
                                <h2 className="text-sm font-bold text-gray-500 uppercase tracking-widest mb-6">Neural Prediction</h2>
                                <div className="space-y-6">
                                    <div className="flex justify-between items-end">
                                        <p className="text-4xl font-black text-teal-400 tracking-tighter">{aiPrediction.direction}</p>
                                        <p className="text-sm font-bold text-gray-400">Confidence: {aiPrediction.confidence}%</p>
                                    </div>
                                    <div className="w-full bg-white/5 h-3 rounded-full overflow-hidden">
                                        <div 
                                            className="bg-teal-500 h-full transition-all duration-1000 ease-out"
                                            style={{ width: `${aiPrediction.confidence}%` }}
                                        ></div>
                                    </div>
                                    <div className="pt-4 border-t border-white/5 flex justify-between">
                                        <span className="text-sm text-gray-400">Market Sentiment:</span>
                                        <span className="text-sm font-bold text-white">{aiPrediction.sentiment}</span>
                                    </div>
                                </div>
                            </div>

                            {/* News Feed */}
                            <div className="glass p-8 rounded-[2.5rem]">
                                <h2 className="text-sm font-bold text-gray-500 uppercase tracking-widest mb-6">High Impact News</h2>
                                <div className="space-y-6">
                                    <NewsItem time="14:30" event="Core CPI m/m" impact="HIGH" color="text-red-500" />
                                    <NewsItem time="16:00" event="Consumer Sentiment" impact="MED" color="text-orange-400" />
                                    <NewsItem time="20:00" event="FOMC Meeting" impact="HIGH" color="text-red-500" />
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Trade History Table */}
                    <div className="glass rounded-[2.5rem] overflow-hidden">
                        <div className="p-8 border-b border-white/5">
                            <h2 className="text-xl font-bold">Real-time Order Execution</h2>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left">
                                <thead className="bg-white/5 text-gray-400 text-xs font-bold uppercase tracking-widest">
                                    <tr>
                                        <th className="p-6">Asset</th>
                                        <th className="p-6">Type</th>
                                        <th className="p-6">Lots</th>
                                        <th className="p-6">Entry</th>
                                        <th className="p-6">Profit</th>
                                        <th className="p-6">Status</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-white/5">
                                    <TradeRow asset="XAUUSD" type="BUY" lots="0.50" entry="2034.45" profit="+$420.00" status="OPEN" />
                                    <TradeRow asset="XAUUSD" type="SELL" lots="0.25" entry="2042.10" profit="+$180.50" status="CLOSED" />
                                    <TradeRow asset="XAUUSD" type="BUY" lots="1.00" entry="2022.00" profit="+$1,200.00" status="CLOSED" />
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Subscription & Billing */}
                    <div className="glass p-10 rounded-[3rem] text-center border-teal-500/20">
                        <h2 className="text-3xl font-black mb-4 uppercase tracking-tighter">Liquid Platinum Access</h2>
                        <p className="text-gray-400 mb-8 max-w-xl mx-auto italic">“Initial activation is $200 with a monthly maintenance fee of $50.”</p>
                        <div className="flex flex-col md:flex-row justify-center gap-8 text-left">
                            <div className="bg-white/5 p-6 rounded-3xl border border-white/10">
                                <p className="text-xs font-bold text-teal-400 uppercase mb-2">M-Pesa Deposit</p>
                                <p className="text-lg font-mono">0701540201</p>
                            </div>
                            <div className="bg-white/5 p-6 rounded-3xl border border-white/10">
                                <p className="text-xs font-bold text-teal-400 uppercase mb-2">USDT TRC20 Address</p>
                                <p className="text-lg font-mono">TBr4ZsJky3ufBaA6WMFVJ7hX36Wtf29NRz</p>
                            </div>
                        </div>
                        <p className="mt-8 text-xs text-gray-500 uppercase font-bold tracking-widest">Send Proof to @LiquidM_Admin on Telegram</p>
                    </div>
                </div>
            );
        };

        const StatCard = ({ label, value, icon, color }) => (
            <div className="glass p-8 rounded-[2rem] flex items-center justify-between hover:scale-[1.02] transition-all duration-300 cursor-pointer">
                <div>
                    <p className="text-xs font-bold text-gray-500 uppercase mb-2 tracking-widest">{label}</p>
                    <p className={`text-2xl font-black ${color}`}>{value}</p>
                </div>
                <div className="bg-white/5 p-4 rounded-2xl">
                    <i className={`fas ${icon} text-teal-500 text-xl`}></i>
                </div>
            </div>
        );

        const NewsItem = ({ time, event, impact, color }) => (
            <div className="flex items-center justify-between group cursor-pointer">
                <div className="flex items-center gap-4">
                    <div className="text-xs font-bold text-gray-500">{time}</div>
                    <p className="text-sm font-semibold group-hover:text-teal-400 transition-colors">{event}</p>
                </div>
                <span className={`text-[10px] font-black px-3 py-1 rounded-lg bg-white/5 ${color}`}>{impact}</span>
            </div>
        );

        const TradeRow = ({ asset, type, lots, entry, profit, status }) => (
            <tr className="hover:bg-white/5 transition-colors group">
                <td className="p-6 font-bold">{asset}</td>
                <td className={`p-6 font-bold text-xs ${type === 'BUY' ? 'text-teal-400' : 'text-red-500'}`}>{type}</td>
                <td className="p-6 text-gray-300">{lots}</td>
                <td className="p-6 font-mono text-gray-400">{entry}</td>
                <td className="p-6 font-bold text-teal-400">{profit}</td>
                <td className="p-6">
                    <span className={`text-[10px] px-3 py-1 rounded-full font-black ${status === 'OPEN' ? 'bg-teal-500 text-black active-pulse' : 'bg-white/10 text-gray-400'}`}>
                        {status}
                    </span>
                </td>
            </tr>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
