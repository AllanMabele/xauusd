<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LiquidGold AI | Institutional XAUUSD Terminal</title>

<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet" />

<style>
  :root { --teal:#2dd4bf; --black:#050505; --card-bg:rgba(15,15,20,0.8); }
  body {
    background-color: var(--black);
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(45,212,191,0.06) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(45,212,191,0.04) 0%, transparent 40%);
    min-height: 100vh;
    overflow-x: hidden;
  }
  .glass {
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 8px 32px 0 rgba(0,0,0,0.8);
  }
  .teal-glow { box-shadow: 0 0 25px rgba(45,212,191,0.15); }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .status-pulse { width:10px; height:10px; border-radius:50%; background:var(--teal); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{transform:scale(.9);opacity:.7} 50%{transform:scale(1.2);opacity:1} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  .animate-fade-in { animation: fadeIn .4s ease-out; }
  input, select, textarea { background:rgba(255,255,255,.05)!important; border:1px solid rgba(255,255,255,.1)!important; color:#fff!important; }
  input:focus, textarea:focus { border-color: var(--teal)!important; outline:none; }
  ::-webkit-scrollbar { width:8px; height:8px; }
  ::-webkit-scrollbar-thumb { background:rgba(45,212,191,.2); border-radius:4px; }
  .modal-bg { background: rgba(0,0,0,.85); backdrop-filter: blur(8px); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback } = React;

/* ========== CONFIG ========== */
const SUPABASE_URL = "https://zqyextmqqlgyfmttuull.supabase.co";
const SUPABASE_KEY = "sb_publishable_h83sBB7QFQwxHCspfgVXtw_byGUWSfd";
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const TELEGRAM_ADMIN = "LiquidM_Admin"; // alerts target
const MPESA_NUMBER = "0701540201";
const USDT_TRC20 = "TBr4ZsJky3ufBaA6WMFVJ7hX36Wtf29NRz";
const STORAGE_BUCKET = "ea-files";

const PRODUCTS = [
  {
    id: "liquidgold-institutional",
    name: "LiquidGold AI — Institutional",
    file: "LiquidGoldAI.mq5",
    price: 100,
    desc: "Multi-timeframe SMC engine (D1 / H4 / M15) with adaptive AI confidence scoring, triple-position bundles, dynamic trailing runner, news filter, and on-chart dashboard.",
    tag: "INSTITUTIONAL",
    icon: "fa-bolt"
  },
  {
    id: "liquidgold-scalper",
    name: "LiquidGold AI — M15 Scalper",
    file: "LiquidGoldAI_Scalper.mq5",
    price: 100,
    desc: "M15 scalper aligned with H4 trend. 50% risk per trade, breakeven at +40 pips, auto-exit on opposite M15 close. Live entry-condition dashboard.",
    tag: "SCALPER",
    icon: "fa-rocket"
  }
];

/* ========== APP ========== */
const App = () => {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    let mounted = true;
    const { data: authListener } = supabaseClient.auth.onAuthStateChange((_e, session) => {
      if (!mounted) return;
      setUser(session?.user || null);
    });
    supabaseClient.auth.getSession().then(({ data }) => {
      if (!mounted) return;
      setUser(data?.session?.user || null);
      setLoading(false);
    });
    return () => { mounted = false; authListener.subscription.unsubscribe(); };
  }, []);

  if (loading) {
    return (
      <div className="h-screen flex flex-col items-center justify-center bg-black text-teal-400 font-bold tracking-widest">
        <i className="fas fa-circle-notch fa-spin text-3xl mb-4"></i>
        INITIALIZING TERMINAL...
      </div>
    );
  }
  return <div className="animate-fade-in">{user ? <Dashboard user={user} /> : <AuthPage />}</div>;
};

/* ========== AUTH ========== */
const AuthPage = () => {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [register, setRegister] = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [info, setInfo] = useState("");

  const handleAuth = async (e) => {
    e?.preventDefault();
    setError(""); setInfo("");
    if (!email || !password) return setError("Email and password are required");
    try {
      setLoading(true);
      const res = register
        ? await supabaseClient.auth.signUp({ email, password, options: { emailRedirectTo: window.location.origin } })
        : await supabaseClient.auth.signInWithPassword({ email, password });
      if (res.error) setError(res.error.message);
      else if (register && !res.data.session) setInfo("Check your email to confirm your account.");
    } catch (err) { setError(err.message || "Unknown error"); }
    finally { setLoading(false); }
  };

  return (
    <div className="min-h-screen flex items-center justify-center p-5">
      <form onSubmit={handleAuth} className="glass w-full max-w-md p-10 rounded-[2.5rem] teal-glow text-center">
        <div className="bg-teal-500/10 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 border border-teal-500/20">
          <i className="fas fa-bolt text-teal-400 text-3xl"></i>
        </div>
        <h1 className="text-3xl font-bold tracking-tighter mb-2">
          LIQUID<span className="text-teal-400">GOLD</span> AI
        </h1>
        <p className="text-gray-500 text-xs uppercase tracking-widest mb-8">Neural Execution Link</p>

        <div className="space-y-4 text-left">
          <div className="space-y-1">
            <label className="text-[10px] font-bold text-gray-500 uppercase ml-2">Node ID (Email)</label>
            <input type="email" className="w-full p-4 rounded-xl outline-none" placeholder="name@firm.com"
              value={email} onChange={(e) => setEmail(e.target.value)} autoComplete="email" />
          </div>
          <div className="space-y-1">
            <label className="text-[10px] font-bold text-gray-500 uppercase ml-2">Secure Key</label>
            <input type="password" className="w-full p-4 rounded-xl outline-none" placeholder="••••••••"
              value={password} onChange={(e) => setPassword(e.target.value)}
              autoComplete={register ? "new-password" : "current-password"} />
          </div>

          {error && <div className="text-red-400 text-xs bg-red-500/10 border border-red-500/20 rounded-lg p-3">{error}</div>}
          {info && <div className="text-teal-400 text-xs bg-teal-500/10 border border-teal-500/20 rounded-lg p-3">{info}</div>}

          <button type="submit" disabled={loading}
            className="w-full bg-teal-500 text-black font-black py-4 rounded-xl uppercase tracking-widest text-sm hover:bg-teal-400 disabled:opacity-50 transition">
            {loading ? "ESTABLISHING..." : register ? "INITIALIZE ACCOUNT" : "ESTABLISH LINK"}
          </button>
          <button type="button" onClick={() => { setRegister(!register); setError(""); setInfo(""); }}
            className="w-full text-gray-500 text-xs uppercase tracking-widest mt-2 hover:text-teal-400 transition">
            {register ? "Existing Node? Sign In" : "Request Institutional Access"}
          </button>
        </div>
      </form>
    </div>
  );
};

/* ========== DASHBOARD ========== */
const Dashboard = ({ user }) => {
  const [payments, setPayments] = useState([]);
  const [activeProduct, setActiveProduct] = useState(null);

  const fetchPayments = useCallback(async () => {
    const { data } = await supabaseClient
      .from("payments").select("*")
      .eq("user_id", user.id)
      .order("created_at", { ascending: false });
    setPayments(data || []);
  }, [user.id]);

  useEffect(() => {
    fetchPayments();
    const ch = supabaseClient
      .channel("user-payments")
      .on("postgres_changes", { event: "*", schema: "public", table: "payments", filter: `user_id=eq.${user.id}` }, () => fetchPayments())
      .subscribe();
    return () => supabaseClient.removeChannel(ch);
  }, [fetchPayments, user.id]);

  const statusFor = (productId) => {
    const p = payments.find(p => p.product_id === productId);
    return p?.status || null; // null | 'PENDING' | 'APPROVED' | 'REJECTED'
  };

  return (
    <div className="max-w-6xl mx-auto p-5 lg:p-10">
      {/* Header */}
      <header className="flex items-center justify-between mb-10 flex-wrap gap-4">
        <div className="flex items-center gap-3">
          <div className="bg-teal-500/10 w-12 h-12 rounded-xl flex items-center justify-center border border-teal-500/20">
            <i className="fas fa-bolt text-teal-400 text-xl"></i>
          </div>
          <div>
            <h1 className="text-xl font-bold tracking-tight">LIQUID<span className="text-teal-400">GOLD</span> AI</h1>
            <p className="text-gray-500 text-[10px] uppercase tracking-widest">{user.email}</p>
          </div>
        </div>
        <div className="flex items-center gap-3">
          <div className="flex items-center gap-2 text-xs text-gray-400 uppercase tracking-widest">
            <span className="status-pulse"></span> Vault Online
          </div>
          <button onClick={() => supabaseClient.auth.signOut()}
            className="px-4 py-2.5 rounded-xl text-xs uppercase tracking-widest text-gray-400 border border-white/10 hover:bg-white/5">
            Logout
          </button>
        </div>
      </header>

      {/* Hero */}
      <section className="glass rounded-3xl p-8 mb-8 teal-glow">
        <div className="text-[10px] tracking-widest text-teal-400 uppercase mb-2">Institutional XAUUSD Arsenal</div>
        <h2 className="text-3xl md:text-4xl font-bold tracking-tight mb-3">Two engines. One edge.</h2>
        <p className="text-gray-400 max-w-2xl">Production-ready MT5 Expert Advisors engineered for XAUUSD. Pay once per EA, confirm your transaction, and download the compiled <span className="mono text-teal-400">.mq5</span> source instantly.</p>
      </section>

      {/* Products */}
      <section className="grid md:grid-cols-2 gap-6 mb-10">
        {PRODUCTS.map(p => {
          const status = statusFor(p.id);
          return (
            <div key={p.id} className="glass rounded-3xl p-7 flex flex-col">
              <div className="flex items-start justify-between mb-4">
                <div className="bg-teal-500/10 w-12 h-12 rounded-xl flex items-center justify-center border border-teal-500/20">
                  <i className={`fas ${p.icon} text-teal-400 text-lg`}></i>
                </div>
                <span className="text-[10px] tracking-widest text-teal-400 bg-teal-500/10 border border-teal-500/20 px-2 py-1 rounded">{p.tag}</span>
              </div>
              <h3 className="text-lg font-bold mb-1">{p.name}</h3>
              <p className="mono text-xs text-gray-500 mb-3">{p.file}</p>
              <p className="text-sm text-gray-400 flex-1 mb-5">{p.desc}</p>
              <div className="flex items-end justify-between mb-5">
                <div>
                  <div className="text-[10px] tracking-widest text-gray-500 uppercase">Unlock</div>
                  <div className="text-3xl font-black mono">${p.price}</div>
                </div>
                <StatusBadge status={status} />
              </div>
              <ProductAction status={status} onUnlock={() => setActiveProduct(p)} product={p} user={user} />
            </div>
          );
        })}
      </section>

      {/* Payment history */}
      <PaymentHistory payments={payments} />

      {activeProduct && (
        <PaymentModal
          product={activeProduct}
          user={user}
          existing={payments.find(p => p.product_id === activeProduct.id && p.status !== 'REJECTED')}
          onClose={() => setActiveProduct(null)}
        />
      )}
    </div>
  );
};

const StatusBadge = ({ status }) => {
  if (!status) return <span className="text-[10px] tracking-widest text-gray-500 uppercase">Locked</span>;
  const map = {
    PENDING: ["text-yellow-400", "bg-yellow-500/10", "border-yellow-500/30", "Awaiting Confirmation"],
    APPROVED: ["text-teal-400", "bg-teal-500/10", "border-teal-500/30", "Unlocked"],
    REJECTED: ["text-red-400", "bg-red-500/10", "border-red-500/30", "Rejected"],
  };
  const [c,b,br,t] = map[status] || map.PENDING;
  return <span className={`text-[10px] tracking-widest uppercase px-2 py-1 rounded border ${c} ${b} ${br}`}>{t}</span>;
};

const ProductAction = ({ status, onUnlock, product, user }) => {
  const [busy, setBusy] = useState(false);

  const download = async () => {
    setBusy(true);
    try {
      const { data, error } = await supabaseClient
        .storage.from(STORAGE_BUCKET)
        .createSignedUrl(product.file, 60);
      if (error) throw error;
      window.open(data.signedUrl, "_blank");
    } catch (e) {
      alert("Download unavailable: " + e.message + "\n\nAdmin must upload " + product.file + " to bucket '" + STORAGE_BUCKET + "'.");
    } finally { setBusy(false); }
  };

  if (status === 'APPROVED') {
    return (
      <button onClick={download} disabled={busy}
        className="w-full bg-teal-500 text-black font-black py-3.5 rounded-xl uppercase tracking-widest text-xs hover:bg-teal-400 transition disabled:opacity-50">
        <i className="fas fa-download mr-2"></i>{busy ? "Preparing..." : "Download .mq5"}
      </button>
    );
  }
  if (status === 'PENDING') {
    return (
      <button onClick={onUnlock} className="w-full bg-yellow-500/10 text-yellow-400 border border-yellow-500/30 font-black py-3.5 rounded-xl uppercase tracking-widest text-xs hover:bg-yellow-500/20 transition">
        <i className="fas fa-clock mr-2"></i>View Pending Confirmation
      </button>
    );
  }
  return (
    <button onClick={onUnlock} className="w-full bg-teal-500 text-black font-black py-3.5 rounded-xl uppercase tracking-widest text-xs hover:bg-teal-400 transition">
      <i className="fas fa-unlock mr-2"></i>Unlock for $100
    </button>
  );
};

/* ========== PAYMENT MODAL ========== */
const PaymentModal = ({ product, user, existing, onClose }) => {
  const [method, setMethod] = useState("MPESA");
  const [txCode, setTxCode] = useState(existing?.tx_code || "");
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState("");
  const [done, setDone] = useState(!!existing);

  const copy = (txt) => {
    navigator.clipboard.writeText(txt).then(() => {
      const el = document.getElementById("copy-toast");
      if (el) { el.style.opacity = 1; setTimeout(() => el.style.opacity = 0, 1500); }
    });
  };

  const submit = async (e) => {
    e.preventDefault();
    setError("");
    if (!txCode.trim() || txCode.trim().length < 6) {
      return setError("Enter the full transaction code from your payment confirmation.");
    }
    setSubmitting(true);
    const payload = {
      user_id: user.id,
      user_email: user.email,
      product_id: product.id,
      product_name: product.name,
      amount: product.price,
      method,
      tx_code: txCode.trim(),
      status: "PENDING",
    };
    const { error } = await supabaseClient.from("payments").upsert(payload, { onConflict: "user_id,product_id" });
    if (error) { setError(error.message); setSubmitting(false); return; }

    // Telegram alert (opens chat with prefilled message to admin)
    const msg = encodeURIComponent(
      `🟢 NEW PAYMENT — LiquidGold AI\n` +
      `Product: ${product.name}\n` +
      `Amount: $${product.price}\n` +
      `Method: ${method}\n` +
      `Tx Code: ${txCode.trim()}\n` +
      `User: ${user.email}\n` +
      `User ID: ${user.id}`
    );
    window.open(`https://t.me/${TELEGRAM_ADMIN}?text=${msg}`, "_blank");

    setDone(true);
    setSubmitting(false);
  };

  return (
    <div className="fixed inset-0 modal-bg z-50 flex items-center justify-center p-4 animate-fade-in" onClick={onClose}>
      <div className="glass rounded-3xl max-w-lg w-full p-8 relative" onClick={e => e.stopPropagation()}>
        <button onClick={onClose} className="absolute top-4 right-4 text-gray-500 hover:text-white">
          <i className="fas fa-times text-lg"></i>
        </button>

        <div className="text-[10px] tracking-widest text-teal-400 uppercase mb-1">Unlock Access</div>
        <h3 className="text-2xl font-bold mb-1">{product.name}</h3>
        <p className="mono text-xs text-gray-500 mb-6">${product.price} · {product.file}</p>

        {done ? (
          <div className="text-center py-6">
            <div className="bg-yellow-500/10 border border-yellow-500/30 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4">
              <i className="fas fa-clock text-yellow-400 text-2xl"></i>
            </div>
            <h4 className="text-lg font-bold mb-2">Payment Submitted</h4>
            <p className="text-sm text-gray-400 mb-6">
              Your transaction code is being reviewed. You will see "Unlocked" and a download button on this page once admin approves it.
            </p>
            <a href={`https://t.me/${TELEGRAM_ADMIN}`} target="_blank" rel="noreferrer"
              className="inline-flex items-center gap-2 text-teal-400 text-xs uppercase tracking-widest hover:underline">
              <i className="fab fa-telegram"></i> Message admin on Telegram
            </a>
          </div>
        ) : (
          <form onSubmit={submit} className="space-y-5">
            {/* Method tabs */}
            <div className="grid grid-cols-2 gap-2 bg-white/5 p-1 rounded-xl">
              {["MPESA", "USDT_TRC20"].map(m => (
                <button type="button" key={m} onClick={() => setMethod(m)}
                  className={`py-2.5 rounded-lg text-xs font-black tracking-widest transition ${method===m ? "bg-teal-500 text-black" : "text-gray-400 hover:text-white"}`}>
                  {m === "MPESA" ? "M-PESA" : "USDT TRC20"}
                </button>
              ))}
            </div>

            {/* Payment details */}
            {method === "MPESA" ? (
              <div className="bg-white/5 border border-white/10 rounded-xl p-4 space-y-2">
                <div className="text-[10px] tracking-widest text-gray-500 uppercase">Send $100 (KES equivalent) to</div>
                <div className="flex items-center justify-between">
                  <span className="mono text-lg text-teal-400">{MPESA_NUMBER}</span>
                  <button type="button" onClick={() => copy(MPESA_NUMBER)} className="text-xs text-gray-400 hover:text-teal-400 uppercase tracking-widest">
                    <i className="fas fa-copy mr-1"></i>Copy
                  </button>
                </div>
                <p className="text-[11px] text-gray-500">Then paste the M-Pesa confirmation code (e.g. <span className="mono">SEK4XYZ123</span>) below.</p>
              </div>
            ) : (
              <div className="bg-white/5 border border-white/10 rounded-xl p-4 space-y-2">
                <div className="text-[10px] tracking-widest text-gray-500 uppercase">Send $100 USDT (TRC20) to</div>
                <div className="flex items-center justify-between gap-2">
                  <span className="mono text-xs text-teal-400 break-all">{USDT_TRC20}</span>
                  <button type="button" onClick={() => copy(USDT_TRC20)} className="text-xs text-gray-400 hover:text-teal-400 uppercase tracking-widest shrink-0">
                    <i className="fas fa-copy mr-1"></i>Copy
                  </button>
                </div>
                <p className="text-[11px] text-gray-500">Then paste the on-chain transaction hash (TxID) below.</p>
              </div>
            )}

            <div className="space-y-1">
              <label className="text-[10px] font-bold text-gray-500 uppercase ml-2">Transaction Code / TxID</label>
              <input type="text" value={txCode} onChange={e => setTxCode(e.target.value)}
                placeholder={method === "MPESA" ? "e.g. SEK4XYZ123" : "e.g. 0xabc...def"}
                className="w-full p-4 rounded-xl outline-none mono text-sm" />
            </div>

            {error && <div className="text-red-400 text-xs bg-red-500/10 border border-red-500/20 rounded-lg p-3">{error}</div>}

            <button type="submit" disabled={submitting}
              className="w-full bg-teal-500 text-black font-black py-4 rounded-xl uppercase tracking-widest text-sm hover:bg-teal-400 disabled:opacity-50 transition">
              {submitting ? "Submitting..." : "Confirm Payment"}
            </button>
            <p className="text-[11px] text-gray-500 text-center">
              On submit, an alert is sent to <span className="text-teal-400">@{TELEGRAM_ADMIN}</span> on Telegram. Access unlocks once verified.
            </p>
          </form>
        )}

        <div id="copy-toast" style={{transition:"opacity .3s",opacity:0}}
          className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-teal-500 text-black text-xs font-black px-4 py-2 rounded-lg uppercase tracking-widest">
          Copied
        </div>
      </div>
    </div>
  );
};

/* ========== HISTORY ========== */
const PaymentHistory = ({ payments }) => (
  <section className="glass rounded-3xl p-7">
    <div className="flex items-center justify-between mb-5">
      <h3 className="text-sm font-bold tracking-widest uppercase">Payment Ledger</h3>
      <span className="text-[10px] tracking-widest text-gray-500">{payments.length} RECORDS</span>
    </div>
    {payments.length === 0 ? (
      <p className="text-center text-gray-500 text-xs py-8 uppercase tracking-widest">No payments submitted</p>
    ) : (
      <div className="overflow-x-auto">
        <table className="w-full text-xs">
          <thead className="text-gray-500 uppercase tracking-widest text-[10px]">
            <tr>
              <th className="text-left py-2">Product</th>
              <th className="text-left py-2">Method</th>
              <th className="text-left py-2">Tx Code</th>
              <th className="text-left py-2">Amount</th>
              <th className="text-left py-2">Status</th>
              <th className="text-left py-2">Date</th>
            </tr>
          </thead>
          <tbody>
            {payments.map(p => (
              <tr key={p.id} className="border-t border-white/5">
                <td className="py-3">{p.product_name}</td>
                <td className="py-3">{p.method}</td>
                <td className="py-3 mono text-teal-400">{p.tx_code}</td>
                <td className="py-3 mono">${p.amount}</td>
                <td className="py-3"><StatusBadge status={p.status} /></td>
                <td className="py-3 text-gray-500">{new Date(p.created_at).toLocaleString()}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    )}
  </section>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
