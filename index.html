<!DOCTYPE html>
<html lang="en">

<script src="https://cdn.tailwindcss.com"></script>

<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet" />

<style>
  :root { --teal:#2dd4bf; --black:#050505; --card-bg:rgba(15,15,20,0.8); }
  body {
    background-color: var(--black); color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(45,212,191,0.06) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(45,212,191,0.04) 0%, transparent 40%);
    min-height: 100vh; overflow-x: hidden;
  }
  .glass { background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 8px 32px 0 rgba(0,0,0,0.8); }
  .teal-glow { box-shadow: 0 0 25px rgba(45,212,191,0.15); }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .status-pulse { width:10px; height:10px; border-radius:50%; background:var(--teal); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{transform:scale(.9);opacity:.7} 50%{transform:scale(1.2);opacity:1} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  .animate-fade-in { animation: fadeIn .4s ease-out; }
  input, select, textarea { background:rgba(255,255,255,.05)!important; border:1px solid rgba(255,255,255,.1)!important; color:#fff!important; }
  input:focus, textarea:focus { border-color: var(--teal)!important; outline:none; }
  ::-webkit-scrollbar { width:8px; height:8px; }
  ::-webkit-scrollbar-thumb { background:rgba(45,212,191,.2); border-radius:4px; }
  .modal-bg { background: rgba(0,0,0,.85); backdrop-filter: blur(8px); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback } = React;

const SUPABASE_URL = "https://zqyextmqqlgyfmttuull.supabase.co";
const SUPABASE_KEY = "sb_publishable_h83sBB7QFQwxHCspfgVXtw_byGUWSfd";
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const TELEGRAM_ADMIN = "LiquidM_Admin";
const MPESA_NUMBER = "0701540201";
const USDT_TRC20 = "TBr4ZsJky3ufBaA6WMFVJ7hX36Wtf29NRz";
const PAYSTACK_LINK = "https://paystack.shop/pay/99upk80blz";
const STORAGE_BUCKET = "ea-files";
const ADMIN_EMAIL = "allymabz@gmail.com";

const PRODUCTS = [
  { id: "liquidgold-institutional", name: "LiquidGold AI — Institutional", file: "LiquidGoldAI.mq5", price: 100,
    desc: "Multi-timeframe SMC engine (D1 / H4 / M15) with adaptive AI confidence scoring, triple-position bundles, dynamic trailing runner, news filter, and on-chart dashboard.",
    tag: "INSTITUTIONAL", icon: "fa-bolt" },
  { id: "liquidgold-scalper", name: "LiquidGold AI — M15 Scalper", file: "LiquidGoldAI_Scalper.mq5", price: 100,
    desc: "M15 scalper aligned with H4 trend. 50% risk per trade, breakeven at +40 pips, auto-exit on opposite M15 close. Live entry-condition dashboard.",
    tag: "SCALPER", icon: "fa-rocket" }
];

const App = () => {
  const [user, setUser] = useState(null);
  const [isAdmin, setIsAdmin] = useState(false);
  const [loading, setLoading] = useState(true);
  const [route, setRoute] = useState("catalog");
  const [authMode, setAuthMode] = useState("login");
  const [pendingProduct, setPendingProduct] = useState(null);

  const checkAdmin = (u) => {
    if (!u) { setIsAdmin(false); return; }
    setIsAdmin((u.email || "").toLowerCase() === ADMIN_EMAIL);
    supabaseClient.rpc("is_admin").then(({ data, error }) => {
      if (!error && typeof data === "boolean") setIsAdmin(data);
    }).catch(() => {});
  };

  useEffect(() => {
    let mounted = true;
    const finish = (session) => {
      if (!mounted) return;
      const u = session?.user || null;
      setUser(u);
      checkAdmin(u);
      if (u) setRoute("dashboard");
      else if (route === "dashboard") setRoute("catalog");
      setLoading(false);
    };
    const { data: authListener } = supabaseClient.auth.onAuthStateChange((_e, session) => finish(session));
    supabaseClient.auth.getSession().then(({ data }) => finish(data?.session));
    const t = setTimeout(() => { if (mounted) setLoading(false); }, 3000);
    return () => { mounted = false; clearTimeout(t); authListener.subscription.unsubscribe(); };
  }, []);

  const goAuth = (mode, product = null) => {
    setAuthMode(mode);
    setPendingProduct(product);
    setRoute("auth");
  };

  if (loading) {
    return (
      <div className="min-h-screen flex items-center justify-center">
        <div className="text-center">
          <div className="status-pulse mx-auto mb-4"></div>
          <div className="text-xs uppercase tracking-widest text-gray-500">INITIALIZING TERMINAL...</div>
        </div>
      </div>
    );
  }

  if (route === "auth") {
    return <AuthPage initialMode={authMode} pendingProduct={pendingProduct} onBack={() => setRoute("catalog")} />;
  }

  if (user && route === "dashboard") {
    return <Dashboard user={user} isAdmin={isAdmin} onSignOut={() => setRoute("catalog")} />;
  }

  return <PublicCatalog onLoginClick={() => goAuth("login")} onRegisterClick={() => goAuth("register")} onBuyClick={(p) => goAuth("login", p)} />;
};

/* ========== PUBLIC CATALOG ========== */
const PublicCatalog = ({ onLoginClick, onRegisterClick, onBuyClick }) => {
  return (
    <div className="max-w-6xl mx-auto p-6 lg:p-10">
      <div className="flex justify-between items-center mb-10">
        <div className="flex items-center gap-3">
          <div className="w-10 h-10 rounded-xl bg-teal-500/20 border border-teal-500/30 flex items-center justify-center">
            <i className="fas fa-wave-square text-teal-400"></i>
          </div>
          <div>
            <h1 className="text-lg font-black tracking-wider">LIQUIDGOLD AI</h1>
            <p className="text-[10px] text-gray-500 uppercase tracking-widest">Institutional XAUUSD Terminal</p>
          </div>
        </div>
        <div className="flex gap-2">
          <button onClick={onLoginClick} className="px-4 py-2 rounded-xl text-xs uppercase tracking-widest text-gray-300 border border-white/10 hover:bg-white/5">Login</button>
          <button onClick={onRegisterClick} className="px-4 py-2 rounded-xl text-xs uppercase tracking-widest bg-teal-500 text-black font-black hover:bg-teal-400">Register</button>
        </div>
      </div>

      <div className="text-center mb-10">
        <h2 className="text-4xl lg:text-5xl font-black tracking-tight mb-3">Institutional XAUUSD Arsenal</h2>
        <p className="text-teal-400 text-sm uppercase tracking-widest mb-4">Two engines. One edge.</p>
        <p className="text-gray-400 max-w-2xl mx-auto">Production-ready MT5 Expert Advisors engineered for XAUUSD. Pay once per EA, confirm your transaction, and download the compiled .mq5 source instantly.</p>
      </div>

      <div className="grid md:grid-cols-2 gap-6">
        {PRODUCTS.map(p => (
          <div key={p.id} className="glass rounded-2xl p-6 teal-glow">
            <div className="flex justify-between items-start mb-4">
              <div className="w-12 h-12 rounded-xl bg-teal-500/20 border border-teal-500/30 flex items-center justify-center">
                <i className={`fas ${p.icon} text-teal-400 text-lg`}></i>
              </div>
              <span className="px-3 py-1 rounded-full bg-teal-500/10 border border-teal-500/30 text-teal-400 text-[10px] font-black tracking-widest">{p.tag}</span>
            </div>
            <h3 className="text-xl font-black mb-1">{p.name}</h3>
            <p className="text-[10px] text-gray-500 uppercase tracking-widest mono mb-3">{p.file}</p>
            <p className="text-sm text-gray-400 mb-6">{p.desc}</p>
            <div className="flex items-center justify-between">
              <div>
                <p className="text-[10px] text-gray-500 uppercase tracking-widest">Unlock</p>
                <p className="text-2xl font-black text-teal-400">${p.price}</p>
              </div>
              <button onClick={() => onBuyClick(p)} className="px-5 py-2.5 rounded-xl bg-teal-500 hover:bg-teal-400 text-black font-black uppercase text-xs tracking-widest">
                Buy Now
              </button>
            </div>
          </div>
        ))}
      </div>

      <p className="text-center text-xs text-gray-500 uppercase tracking-widest mt-10">Login or register to purchase and download.</p>
    </div>
  );
};

/* ========== AUTH PAGE ========== */
const AuthPage = ({ initialMode = "login", pendingProduct, onBack }) => {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [register, setRegister] = useState(initialMode === "register");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [info, setInfo] = useState("");

  const handleAuth = async (e) => {
    e?.preventDefault();
    setError(""); setInfo("");
    if (!email || !password) return setError("Email and password are required");
    try {
      setLoading(true);
      const res = register
        ? await supabaseClient.auth.signUp({ email, password, options: { emailRedirectTo: window.location.origin } })
        : await supabaseClient.auth.signInWithPassword({ email, password });
      if (res.error) setError(res.error.message);
      else if (register && !res.data.session) setInfo("Check your email to confirm your account.");
    } catch (err) { setError(err.message || "Unknown error"); }
    finally { setLoading(false); }
  };

  return (
    <div className="min-h-screen flex items-center justify-center p-6">
      <div className="w-full max-w-md">
        <button onClick={onBack} className="text-xs uppercase tracking-widest text-gray-500 hover:text-teal-400 mb-4">
          <i className="fas fa-arrow-left mr-2"></i>Back to catalog
        </button>
        <div className="text-center mb-8">
          <div className="w-16 h-16 mx-auto rounded-2xl bg-teal-500/20 border border-teal-500/30 flex items-center justify-center mb-4">
            <i className="fas fa-wave-square text-teal-400 text-2xl"></i>
          </div>
          <h1 className="text-2xl font-black tracking-wider">LIQUIDGOLD AI</h1>
          <p className="text-[10px] text-gray-500 uppercase tracking-widest">Neural Execution Link</p>
          {pendingProduct && (
            <p className="mt-3 text-xs text-teal-400 uppercase tracking-widest">Sign in to purchase {pendingProduct.name}</p>
          )}
        </div>

        <form onSubmit={handleAuth} className="glass rounded-2xl p-6 space-y-4">
          <div>
            <label className="text-[10px] uppercase tracking-widest text-gray-500">Node ID (Email)</label>
            <input type="email" placeholder="ops@firm.com" className="w-full p-3 rounded-xl mt-1"
              value={email} onChange={(e) => setEmail(e.target.value)} autoComplete="email" />
          </div>
          <div>
            <label className="text-[10px] uppercase tracking-widest text-gray-500">Secure Key</label>
            <input type="password" placeholder="••••••••" className="w-full p-3 rounded-xl mt-1"
              value={password} onChange={(e) => setPassword(e.target.value)}
              autoComplete={register ? "new-password" : "current-password"} />
          </div>

          {error && <p className="text-red-400 text-xs">{error}</p>}
          {info && <p className="text-teal-400 text-xs">{info}</p>}

          <button type="submit" disabled={loading} className="w-full py-3 rounded-xl bg-teal-500 hover:bg-teal-400 text-black font-black uppercase tracking-widest text-xs disabled:opacity-50">
            {loading ? "ESTABLISHING..." : register ? "INITIALIZE ACCOUNT" : "ESTABLISH LINK"}
          </button>
          <button type="button" onClick={() => { setRegister(!register); setError(""); setInfo(""); }}
            className="w-full text-gray-500 text-xs uppercase tracking-widest mt-2 hover:text-teal-400 transition">
            {register ? "Existing Node? Sign In" : "Request Institutional Access"}
          </button>
        </form>
      </div>
    </div>
  );
};

/* ========== DASHBOARD ========== */
const Dashboard = ({ user, isAdmin, onSignOut }) => {
  const [view, setView] = useState("user");
  const [payments, setPayments] = useState([]);
  const [activeProduct, setActiveProduct] = useState(null);

  const fetchPayments = useCallback(async () => {
    const { data } = await supabaseClient
      .from("payments").select("*")
      .eq("user_id", user.id)
      .order("created_at", { ascending: false });
    setPayments(data || []);
  }, [user.id]);

  useEffect(() => {
    fetchPayments();
    const ch = supabaseClient
      .channel("user-payments")
      .on("postgres_changes", { event: "*", schema: "public", table: "payments", filter: `user_id=eq.${user.id}` }, () => fetchPayments())
      .subscribe();
    return () => supabaseClient.removeChannel(ch);
  }, [fetchPayments, user.id]);

  const statusFor = (productId) => payments.find(p => p.product_id === productId)?.status || null;

  return (
    <div className="max-w-6xl mx-auto p-6 lg:p-10">
      <div className="flex flex-wrap justify-between items-center gap-4 mb-10">
        <div className="flex items-center gap-3">
          <div className="w-10 h-10 rounded-xl bg-teal-500/20 border border-teal-500/30 flex items-center justify-center">
            <i className="fas fa-wave-square text-teal-400"></i>
          </div>
          <div>
            <h1 className="text-lg font-black tracking-wider">LIQUIDGOLD AI</h1>
            <p className="text-[10px] text-gray-500 uppercase tracking-widest">{user.email}{isAdmin && <span className="text-teal-400"> · ADMIN</span>}</p>
          </div>
        </div>
        <div className="flex items-center gap-3">
          {isAdmin && (
            <button onClick={() => setView(view === "admin" ? "user" : "admin")}
              className="px-4 py-2.5 rounded-xl text-xs uppercase tracking-widest text-teal-400 border border-teal-500/30 hover:bg-teal-500/10">
              {view === "admin" ? "User View" : "Admin Panel"}
            </button>
          )}
          <div className="flex items-center gap-2 px-3 py-2 rounded-xl border border-white/10">
            <div className="status-pulse"></div>
            <span className="text-[10px] uppercase tracking-widest text-gray-400">Vault Online</span>
          </div>
          <button onClick={async () => { await supabaseClient.auth.signOut(); onSignOut && onSignOut(); }}
            className="px-4 py-2.5 rounded-xl text-xs uppercase tracking-widest text-gray-400 border border-white/10 hover:bg-white/5">
            Logout
          </button>
        </div>
      </div>

      {view === "admin" && isAdmin ? (
        <AdminPanel />
      ) : (
        <>
          <div className="text-center mb-10">
            <h2 className="text-4xl lg:text-5xl font-black tracking-tight mb-3">Institutional XAUUSD Arsenal</h2>
            <p className="text-teal-400 text-sm uppercase tracking-widest mb-4">Two engines. One edge.</p>
            <p className="text-gray-400 max-w-2xl mx-auto">Pay once per EA, confirm your transaction, and download the compiled .mq5 source instantly.</p>
          </div>

          <div className="grid md:grid-cols-2 gap-6">
            {PRODUCTS.map(p => {
              const status = statusFor(p.id);
              return (
                <div key={p.id} className="glass rounded-2xl p-6 teal-glow flex flex-col">
                  <div className="flex justify-between items-start mb-4">
                    <div className="w-12 h-12 rounded-xl bg-teal-500/20 border border-teal-500/30 flex items-center justify-center">
                      <i className={`fas ${p.icon} text-teal-400 text-lg`}></i>
                    </div>
                    <span className="px-3 py-1 rounded-full bg-teal-500/10 border border-teal-500/30 text-teal-400 text-[10px] font-black tracking-widest">{p.tag}</span>
                  </div>
                  <h3 className="text-xl font-black mb-1">{p.name}</h3>
                  <p className="text-[10px] text-gray-500 uppercase tracking-widest mono mb-3">{p.file}</p>
                  <p className="text-sm text-gray-400 mb-6 flex-1">{p.desc}</p>
                  <div className="flex items-center justify-between mb-4">
                    <div>
                      <p className="text-[10px] text-gray-500 uppercase tracking-widest">Unlock</p>
                      <p className="text-2xl font-black text-teal-400">${p.price}</p>
                    </div>
                    <StatusBadge status={status} />
                  </div>
                  <div>
                    <ProductAction status={status} onUnlock={() => setActiveProduct(p)} product={p} user={user} />
                  </div>
                </div>
              );
            })}
          </div>

          <PaymentHistory payments={payments} />

          {activeProduct && (
            <PaymentModal product={activeProduct} user={user}
              existing={payments.find(p => p.product_id === activeProduct.id && p.status !== 'REJECTED')}
              onClose={() => setActiveProduct(null)} />
          )}
        </>
      )}
    </div>
  );
};

const StatusBadge = ({ status }) => {
  if (!status) return <span className="px-3 py-1 rounded-full text-[10px] font-black tracking-widest bg-white/5 border border-white/10 text-gray-400">Locked</span>;
  const map = {
    PENDING:  ["text-yellow-400", "bg-yellow-500/10", "border-yellow-500/30", "Awaiting Confirmation"],
    APPROVED: ["text-teal-400",   "bg-teal-500/10",   "border-teal-500/30",   "Unlocked"],
    REJECTED: ["text-red-400",    "bg-red-500/10",    "border-red-500/30",    "Rejected"],
  };
  const [c,b,br,t] = map[status] || map.PENDING;
  return <span className={`px-3 py-1 rounded-full text-[10px] font-black tracking-widest ${c} ${b} border ${br}`}>{t}</span>;
};

const ProductAction = ({ status, onUnlock, product }) => {
  const [busy, setBusy] = useState(false);
  const download = async () => {
    setBusy(true);
    try {
      const { data, error } = await supabaseClient.storage.from(STORAGE_BUCKET).createSignedUrl(product.file, 60);
      if (error) throw error;
      window.open(data.signedUrl, "_blank");
    } catch (e) {
      alert("Download unavailable: " + e.message);
    } finally { setBusy(false); }
  };
  if (status === 'APPROVED') {
    return <button onClick={download} disabled={busy} className="w-full py-3 rounded-xl bg-teal-500 hover:bg-teal-400 text-black font-black uppercase tracking-widest text-xs disabled:opacity-50">{busy ? "Preparing..." : "Download .mq5"}</button>;
  }
  if (status === 'PENDING') {
    return <button onClick={onUnlock} className="w-full py-3 rounded-xl border border-yellow-500/40 text-yellow-400 hover:bg-yellow-500/10 font-black uppercase tracking-widest text-xs">View Pending Confirmation</button>;
  }
  return <button onClick={onUnlock} className="w-full py-3 rounded-xl bg-teal-500 hover:bg-teal-400 text-black font-black uppercase tracking-widest text-xs">Unlock for $100</button>;
};

/* ========== ADMIN PANEL ========== */
const AdminPanel = () => {
  const [rows, setRows] = useState([]);
  const [filter, setFilter] = useState("PENDING");
  const [loading, setLoading] = useState(true);
  const [busyId, setBusyId] = useState(null);
  const [error, setError] = useState("");

  const fetchAll = useCallback(async () => {
    setLoading(true); setError("");
    let q = supabaseClient.from("payments").select("*").order("created_at", { ascending: false });
    if (filter !== "ALL") q = q.eq("status", filter);
    const { data, error } = await q;
    if (error) setError(error.message);
    setRows(data || []);
    setLoading(false);
  }, [filter]);

  useEffect(() => {
    fetchAll();
    const ch = supabaseClient
      .channel("admin-payments")
      .on("postgres_changes", { event: "*", schema: "public", table: "payments" }, () => fetchAll())
      .subscribe();
    return () => supabaseClient.removeChannel(ch);
  }, [fetchAll]);

  const setStatus = async (row, status) => {
    setBusyId(row.id); setError("");
    const { error } = await supabaseClient.from("payments").update({ status }).eq("id", row.id);
    if (error) setError(error.message);
    setBusyId(null);
  };

  return (
    <div className="glass rounded-2xl p-6">
      <div className="flex flex-wrap justify-between items-center gap-4 mb-6">
        <div>
          <h2 className="text-xl font-black tracking-wider">Admin · Payment Approvals</h2>
          <p className="text-[10px] uppercase tracking-widest text-gray-500">Approve or reject buyer transactions</p>
        </div>
        <div className="flex gap-2">
          {["PENDING","APPROVED","REJECTED","ALL"].map(f => (
            <button key={f} onClick={() => setFilter(f)}
              className={`px-3 py-2 rounded-lg text-[10px] font-black tracking-widest uppercase border ${filter===f ? "bg-teal-500 text-black border-teal-500" : "border-white/10 text-gray-400 hover:text-white"}`}>
              {f}
            </button>
          ))}
        </div>
      </div>

      {error && <p className="text-red-400 text-xs mb-4">{error}</p>}

      {loading ? (
        <p className="text-gray-500 text-xs uppercase tracking-widest">Loading...</p>
      ) : rows.length === 0 ? (
        <p className="text-gray-500 text-xs uppercase tracking-widest">No records.</p>
      ) : (
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead>
              <tr className="text-left text-[10px] uppercase tracking-widest text-gray-500 border-b border-white/10">
                <th className="py-2 pr-4">User</th>
                <th className="py-2 pr-4">Product</th>
                <th className="py-2 pr-4">Method</th>
                <th className="py-2 pr-4">Tx Code</th>
                <th className="py-2 pr-4">Amount</th>
                <th className="py-2 pr-4">Status</th>
                <th className="py-2 pr-4">Date</th>
                <th className="py-2">Actions</th>
              </tr>
            </thead>
            <tbody>
              {rows.map(r => (
                <tr key={r.id} className="border-b border-white/5">
                  <td className="py-3 pr-4">{r.user_email}</td>
                  <td className="py-3 pr-4">{r.product_name}</td>
                  <td className="py-3 pr-4">{r.method}</td>
                  <td className="py-3 pr-4 mono text-xs">{r.tx_code}</td>
                  <td className="py-3 pr-4">${r.amount}</td>
                  <td className="py-3 pr-4"><StatusBadge status={r.status} /></td>
                  <td className="py-3 pr-4 text-xs text-gray-400">{new Date(r.created_at).toLocaleString()}</td>
                  <td className="py-3">
                    <div className="flex gap-2">
                      <button disabled={busyId===r.id} onClick={() => setStatus(r, 'APPROVED')}
                        className="px-3 py-1.5 rounded-lg bg-teal-500 hover:bg-teal-400 text-black font-black uppercase text-[10px] tracking-widest disabled:opacity-40">Approve</button>
                      <button disabled={busyId===r.id} onClick={() => setStatus(r, 'REJECTED')}
                        className="px-3 py-1.5 rounded-lg border border-red-500/40 text-red-400 hover:bg-red-500/10 font-black uppercase text-[10px] tracking-widest disabled:opacity-40">Reject</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
};

/* ========== PAYMENT MODAL ========== */
const PaymentModal = ({ product, user, existing, onClose }) => {
  const [method, setMethod] = useState(existing?.method || "MPESA");
  const [txCode, setTxCode] = useState(existing?.tx_code || "");
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState("");
  const [done, setDone] = useState(!!existing);

  const copy = (txt) => {
    navigator.clipboard.writeText(txt).then(() => {
      const el = document.getElementById("copy-toast");
      if (el) { el.style.opacity = 1; setTimeout(() => el.style.opacity = 0, 1500); }
    });
  };

  const submit = async (e) => {
    e.preventDefault();
    setError("");
    if (!txCode.trim() || txCode.trim().length < 6) {
      return setError(method === "CARD"
        ? "Enter the Paystack reference shown on your payment receipt (e.g. T123abc456)."
        : "Enter the full transaction code from your payment confirmation.");
    }
    setSubmitting(true);
    const payload = {
      user_id: user.id, user_email: user.email, product_id: product.id, product_name: product.name,
      amount: product.price, method, tx_code: txCode.trim(), status: "PENDING",
    };
    const { error } = await supabaseClient.from("payments").upsert(payload, { onConflict: "user_id,product_id" });
    if (error) { setError(error.message); setSubmitting(false); return; }
    const msg = encodeURIComponent(
      `🟢 NEW PAYMENT — LiquidGold AI\nProduct: ${product.name}\nAmount: $${product.price}\nMethod: ${method}\nTx Code: ${txCode.trim()}\nUser: ${user.email}\nUser ID: ${user.id}`
    );
    window.open(`https://t.me/${TELEGRAM_ADMIN}?text=${msg}`, "_blank");
    setDone(true); setSubmitting(false);
  };

  const methods = [
    { id: "MPESA", label: "M-PESA" },
    { id: "USDT_TRC20", label: "USDT TRC20" },
    { id: "CARD", label: "Card" },
  ];

  return (
    <div className="fixed inset-0 modal-bg z-50 flex items-center justify-center p-4 animate-fade-in" onClick={onClose}>
      <div className="glass rounded-2xl p-6 w-full max-w-lg relative" onClick={(e) => e.stopPropagation()}>
        <button onClick={onClose} className="absolute top-4 right-4 text-gray-500 hover:text-white"><i className="fas fa-times"></i></button>
        <h2 className="text-xl font-black tracking-wider mb-1">Unlock Access</h2>
        <p className="text-teal-400 text-xs uppercase tracking-widest mb-1">{product.name}</p>
        <p className="text-[10px] text-gray-500 uppercase tracking-widest mono mb-6">${product.price} · {product.file}</p>

        {done ? (
          <div className="text-center py-6">
            <div className="w-16 h-16 mx-auto rounded-full bg-teal-500/20 border border-teal-500/30 flex items-center justify-center mb-4">
              <i className="fas fa-check text-teal-400 text-2xl"></i>
            </div>
            <h3 className="text-lg font-black mb-2">Payment Submitted</h3>
            <p className="text-sm text-gray-400 mb-4">Your transaction code is being reviewed. You will see "Unlocked" and a download button on this page once admin approves it.</p>
            <a href={`https://t.me/${TELEGRAM_ADMIN}`} target="_blank" rel="noreferrer" className="inline-block px-4 py-2 rounded-lg border border-teal-500/30 text-teal-400 text-xs uppercase tracking-widest hover:bg-teal-500/10">Message admin on Telegram</a>
          </div>
        ) : (
          <form onSubmit={submit} className="space-y-4">
            <div className="grid grid-cols-3 gap-2 p-1 rounded-xl bg-white/5 border border-white/10">
              {methods.map(m => (
                <button type="button" key={m.id} onClick={() => setMethod(m.id)}
                  className={`py-2.5 rounded-lg text-xs font-black tracking-widest transition ${method===m.id ? "bg-teal-500 text-black" : "text-gray-400 hover:text-white"}`}>
                  {m.label}
                </button>
              ))}
            </div>

            {method === "MPESA" && (
              <div className="p-4 rounded-xl bg-white/5 border border-white/10">
                <p className="text-[10px] uppercase tracking-widest text-gray-500 mb-2">Send $100 (KES equivalent) to</p>
                <div className="flex justify-between items-center">
                  <p className="mono text-base text-teal-400">{MPESA_NUMBER}</p>
                  <button type="button" onClick={() => copy(MPESA_NUMBER)} className="text-xs text-gray-400 hover:text-teal-400 uppercase tracking-widest">Copy</button>
                </div>
                <p className="text-[10px] text-gray-500 mt-3">Then paste the M-Pesa confirmation code (e.g. SEK4XYZ123) below.</p>
              </div>
            )}

            {method === "USDT_TRC20" && (
              <div className="p-4 rounded-xl bg-white/5 border border-white/10">
                <p className="text-[10px] uppercase tracking-widest text-gray-500 mb-2">Send $100 USDT (TRC20) to</p>
                <div className="flex justify-between items-center gap-2">
                  <p className="mono text-xs text-teal-400 break-all">{USDT_TRC20}</p>
                  <button type="button" onClick={() => copy(USDT_TRC20)} className="text-xs text-gray-400 hover:text-teal-400 uppercase tracking-widest shrink-0">Copy</button>
                </div>
                <p className="text-[10px] text-gray-500 mt-3">Then paste the on-chain transaction hash (TxID) below.</p>
              </div>
            )}

            {method === "CARD" && (
              <div className="p-4 rounded-xl bg-white/5 border border-white/10">
                <p className="text-[10px] uppercase tracking-widest text-gray-500 mb-3">Pay $100 securely by card via Paystack</p>
                <a href={PAYSTACK_LINK} target="_blank" rel="noreferrer"
                  className="block w-full text-center py-3 rounded-xl bg-teal-500 hover:bg-teal-400 text-black font-black uppercase tracking-widest text-xs">
                  <i className="fas fa-credit-card mr-2"></i>Pay with Card · ${product.price}
                </a>
                <div className="flex justify-between items-center gap-2 mt-3">
                  <p className="mono text-[10px] text-teal-400 break-all">{PAYSTACK_LINK}</p>
                  <button type="button" onClick={() => copy(PAYSTACK_LINK)} className="text-xs text-gray-400 hover:text-teal-400 uppercase tracking-widest shrink-0">Copy</button>
                </div>
                <p className="text-[10px] text-gray-500 mt-3">After payment, copy the Paystack reference from the receipt page or confirmation email and paste it below.</p>
              </div>
            )}

            <div>
              <label className="text-[10px] uppercase tracking-widest text-gray-500">
                {method === "CARD" ? "Paystack Reference" : "Transaction Code / TxID"}
              </label>
              <input type="text" value={txCode} onChange={(e) => setTxCode(e.target.value)}
                placeholder={method === "MPESA" ? "e.g. SEK4XYZ123" : method === "CARD" ? "e.g. T123abc456xyz" : "e.g. 0xabc...def"}
                className="w-full p-4 rounded-xl outline-none mono text-sm" />
            </div>

            {error && <p className="text-red-400 text-xs">{error}</p>}

            <button type="submit" disabled={submitting} className="w-full py-3 rounded-xl bg-teal-500 hover:bg-teal-400 text-black font-black uppercase tracking-widest text-xs disabled:opacity-50">
              {submitting ? "Submitting..." : "Confirm Payment"}
            </button>
            <p className="text-[10px] text-gray-500 text-center">
              On submit, an alert is sent to <span className="text-teal-400">@{TELEGRAM_ADMIN}</span> on Telegram. Access unlocks once verified.
            </p>
          </form>
        )}

        <div id="copy-toast" style={{ opacity: 0, transition: 'opacity .3s' }}
          className="absolute bottom-4 left-1/2 -translate-x-1/2 px-3 py-1.5 rounded-lg bg-teal-500 text-black text-[10px] font-black uppercase tracking-widest">
          Copied
        </div>
      </div>
    </div>
  );
};

const PaymentHistory = ({ payments }) => (
  <div className="glass rounded-2xl p-6 mt-10">
    <div className="flex justify-between items-center mb-4">
      <h2 className="text-lg font-black tracking-wider">Payment Ledger</h2>
      <span className="text-[10px] uppercase tracking-widest text-gray-500">{payments.length} RECORDS</span>
    </div>
    {payments.length === 0 ? (
      <p className="text-gray-500 text-xs uppercase tracking-widest">No payments submitted</p>
    ) : (
      <div className="overflow-x-auto">
        <table className="w-full text-sm">
          <thead>
            <tr className="text-left text-[10px] uppercase tracking-widest text-gray-500 border-b border-white/10">
              <th className="py-2 pr-4">Product</th>
              <th className="py-2 pr-4">Method</th>
              <th className="py-2 pr-4">Tx Code</th>
              <th className="py-2 pr-4">Amount</th>
              <th className="py-2 pr-4">Status</th>
              <th className="py-2">Date</th>
            </tr>
          </thead>
          <tbody>
            {payments.map(p => (
              <tr key={p.id} className="border-b border-white/5">
                <td className="py-3 pr-4">{p.product_name}</td>
                <td className="py-3 pr-4">{p.method}</td>
                <td className="py-3 pr-4 mono text-xs">{p.tx_code}</td>
                <td className="py-3 pr-4">${p.amount}</td>
                <td className="py-3 pr-4"><StatusBadge status={p.status} /></td>
                <td className="py-3 text-xs text-gray-400">{new Date(p.created_at).toLocaleString()}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    )}
  </div>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
