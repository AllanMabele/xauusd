<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiquidGold AI | Institutional XAUUSD Terminal</title>
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        :root { --teal: #2dd4bf; --black: #050505; --card-bg: rgba(15, 15, 20, 0.8); }
        body { background-color: var(--black); color: #ffffff; font-family: 'Space Grotesk', sans-serif; background-image: radial-gradient(circle at 10% 20%, rgba(45, 212, 191, 0.05) 0%, transparent 40%); min-height: 100vh; overflow-x: hidden; }
        .glass { background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); }
        .teal-glow { box-shadow: 0 0 25px rgba(45, 212, 191, 0.15); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .status-pulse { width: 10px; height: 10px; border-radius: 50%; background: var(--teal); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(0.9); opacity: 0.7; } 50% { transform: scale(1.2); opacity: 1; } }
        input, select { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- LOAD BABEL FIRST -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        /* ==============================
           SUPABASE CONFIG
        ================================= */
        const SUPABASE_URL = "https://zqyextmqqlgyfmttuull.supabase.co";
        const SUPABASE_KEY = "sb_publishable_h83sBB7QFQwxHCspfgVXtw_byGUWSfd";

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        /* ==============================
           APP ENTRY
        ================================= */
        const App = () => {
            const [view, setView] = useState("auth");
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const init = async () => {
                    const { data } = await supabaseClient.auth.getSession();
                    if(data?.session) {
                        setUser(data.session.user);
                        setView("dashboard");
                    }
                    setLoading(false);
                };
                init();

                const { data: authListener } = supabaseClient.auth.onAuthStateChange((event, session) => {
                    if(session) {
                        setUser(session.user);
                        setView("dashboard");
                    } else {
                        setUser(null);
                        setView("auth");
                    }
                });

                return () => authListener.subscription.unsubscribe();
            }, []);

            if(loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-black text-teal-400 font-bold tracking-widest">
                    <i className="fas fa-circle-notch fa-spin text-3xl mb-4"></i>
                    INITIALIZING TERMINAL...
                </div>
            );

            return (
                <div className="animate-fade-in">
                    {view === "auth" ? <AuthPage /> : <Dashboard user={user} setView={setView} />}
                </div>
            );
        };

        /* ==============================
           AUTH PAGE (Institutional UI)
        ================================= */
        const AuthPage = () => {
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [register, setRegister] = useState(false);
            const [loading, setLoading] = useState(false);

            const handleAuth = async () => {
                try {
                    setLoading(true);
                    const response = register 
                        ? await supabaseClient.auth.signUp({ email, password }) 
                        : await supabaseClient.auth.signInWithPassword({ email, password });
                    if(response.error) alert(response.error.message);
                } catch(err) { console.log(err); } 
                finally { setLoading(false); }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-5">
                    <div className="glass w-full max-w-md p-10 rounded-[2.5rem] teal-glow text-center">
                        <div className="bg-teal-500/10 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 border border-teal-500/20">
                            <i className="fas fa-bolt text-teal-400 text-3xl"></i>
                        </div>
                        <h1 className="text-3xl font-bold tracking-tighter mb-2">
                            LIQUID<span className="text-teal-400">GOLD</span> AI
                        </h1>
                        <p className="text-gray-500 text-xs uppercase tracking-widest mb-8">Neural Execution Link</p>

                        <div className="space-y-4 text-left">
                            <div className="space-y-1">
                                <label className="text-[10px] font-bold text-gray-500 uppercase ml-2">Node ID (Email)</label>
                                <input className="w-full p-4 rounded-xl outline-none" placeholder="name@firm.com" value={email} onChange={(e)=>setEmail(e.target.value)} />
                            </div>
                            <div className="space-y-1">
                                <label className="text-[10px] font-bold text-gray-500 uppercase ml-2">Secure Key</label>
                                <input type="password" className="w-full p-4 rounded-xl outline-none" placeholder="••••••••" value={password} onChange={(e)=>setPassword(e.target.value)} />
                            </div>
                            <button onClick={handleAuth} disabled={loading} className="w-full bg-teal-400 text-black font-black p-5 rounded-xl transition-all hover:bg-teal-300">
                                {loading ? "ESTABLISHING..." : register ? "INITIALIZE ACCOUNT" : "ESTABLISH LINK"}
                            </button>
                            <button className="w-full text-teal-400 text-xs font-bold uppercase tracking-widest mt-4" onClick={()=>setRegister(!register)}>
                                {register ? "Existing Node? Sign In" : "Request Institutional Access"}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        /* ==============================
           DASHBOARD (Institutional UI)
        ================================= */
        const Dashboard = ({ user, setView }) => {
            const [trades, setTrades] = useState([]);
            const [botActive, setBotActive] = useState(false);
            const [goldPrice, setGoldPrice] = useState(2345.50);
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            const fetchTrades = async () => {
                const { data, error } = await supabaseClient.from("trades").select("*").order("created_at", { ascending:false });
                if(!error) setTrades(data);
            };

            // Real-time Price Simulation
            useEffect(() => {
                const interval = setInterval(() => {
                    setGoldPrice(prev => Number((prev + (Math.random() - 0.5) * 1.5).toFixed(2)));
                }, 2000);
                return () => clearInterval(interval);
            }, []);

            // Real-time Trade Updates
            useEffect(() => {
                fetchTrades();
                const channel = supabaseClient.channel("live-trades").on("postgres_changes", { event:"*", schema:"public", table:"trades" }, ()=>fetchTrades()).subscribe();
                return () => supabaseClient.removeChannel(channel);
            }, []);

            // Chart Initialization & Live Updates
            useEffect(() => {
                if(!chartRef.current) return;
                const options = {
                    chart: { type: "area", height: 350, background: "transparent", toolbar: { show: false }, animations: { enabled: true, easing: 'linear', dynamicAnimation: { speed: 1000 } } },
                    theme: { mode: "dark" },
                    series: [{ name: "XAUUSD", data: [] }],
                    colors: ["#2dd4bf"],
                    fill: { type: "gradient", gradient: { opacityFrom: 0.2, opacityTo: 0 } },
                    stroke: { curve: "smooth", width: 2 },
                    grid: { borderColor: "rgba(255,255,255,0.05)" },
                    xaxis: { labels: { show: false }, axisBorder: { show: false } },
                    yaxis: { labels: { style: { colors: "#444", fontFamily: 'JetBrains Mono' } } }
                };
                chartInstance.current = new ApexCharts(chartRef.current, options);
                chartInstance.current.render();
                return () => chartInstance.current.destroy();
            }, []);

            useEffect(() => {
                if(!chartInstance.current) return;
                const existing = chartInstance.current.w.config.series[0].data;
                const updated = [...existing, goldPrice].slice(-30);
                chartInstance.current.updateSeries([{ data: updated }]);
            }, [goldPrice]);

            const createTrade = async (type) => {
                if(!botActive) return alert("System Offline: Activate Neural Engine First");
                const entry = goldPrice;
                const positions = [
                    { user_id:user.id, type, symbol:"XAUUSD", lots:0.5, entry_price:entry, tp:entry + 20, sl:entry - 10, status: 'OPEN' },
                    { user_id:user.id, type, symbol:"XAUUSD", lots:0.5, entry_price:entry, tp:entry + 20, sl:entry - 10, status: 'OPEN' },
                    { user_id:user.id, type, symbol:"XAUUSD", lots:0.5, entry_price:entry, tp:entry + 50, sl:entry - 10, status: 'OPEN' }
                ];
                const { error } = await supabaseClient.from("trades").insert(positions);
                if(error) alert(error.message);
            };

            const settleTrade = async (id) => {
                await supabaseClient.from("trades").update({ status: 'CLOSED', profit: (Math.random() * 500).toFixed(2) }).eq('id', id);
                fetchTrades();
            };

            const totalProfit = useMemo(() => trades.reduce((acc, t) => acc + parseFloat(t.profit || 0), 0), [trades]);

            return (
                <div className="max-w-[1600px] mx-auto p-4 lg:p-8 space-y-6">
                    <nav className="glass rounded-3xl p-6 flex justify-between items-center border border-white/5 teal-glow">
                        <div className="flex items-center gap-4">
                            <div className="h-10 w-10 bg-teal-500 rounded-xl flex items-center justify-center shadow-lg shadow-teal-500/40 text-black">
                                <i className="fas fa-wave-square"></i>
                            </div>
                            <h2 className="text-xl font-bold tracking-tighter">LIQUID<span className="text-teal-400">GOLD</span> AI</h2>
                        </div>
                        <div className="flex items-center gap-6">
                            <div className="hidden md:flex items-center gap-3">
                                <div className="status-pulse"></div>
                                <span className="text-[10px] font-black text-teal-400 uppercase tracking-widest">Neural Link Active</span>
                            </div>
                            <button onClick={()=>setBotActive(!botActive)} className={`px-8 py-2.5 rounded-xl font-black text-xs uppercase tracking-widest transition-all ${botActive ? 'bg-red-500/10 text-red-500 border border-red-500/50 active-pulse' : 'bg-teal-500 text-black'}`}>
                                {botActive ? 'TERMINATE ENGINE' : 'ACTIVATE ENGINE'}
                            </button>
                            <i className="fas fa-sign-out-alt text-gray-500 cursor-pointer hover:text-white" onClick={()=>supabaseClient.auth.signOut()}></i>
                        </div>
                    </nav>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <StatCard label="Live Gold Price" value={`$${goldPrice}`} sub="Real-time Simulation" color="text-teal-400" />
                        <StatCard label="Active Nodes" value={trades.filter(t => t.status === 'OPEN').length} sub="Open Positions" color="text-white" />
                        <StatCard label="Net Realized" value={`+$${totalProfit.toLocaleString()}`} sub="Total Settled" color="text-teal-400" />
                        <StatCard label="Node Status" value={botActive ? "ACTIVE" : "STANDBY"} sub="Neural Engine" color="text-white" />
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        <div className="lg:col-span-8 glass rounded-[2.5rem] p-8 border border-white/5">
                            <div className="flex justify-between items-center mb-8">
                                <h3 className="font-bold text-lg">Neural Price Map</h3>
                                <div className="flex gap-2">
                                    <button onClick={()=>createTrade("BUY")} className="bg-teal-500/10 text-teal-500 px-6 py-2 rounded-xl text-xs font-black border border-teal-500/20 hover:bg-teal-500 hover:text-black">BUY</button>
                                    <button onClick={()=>createTrade("SELL")} className="bg-red-500/10 text-red-500 px-6 py-2 rounded-xl text-xs font-black border border-red-500/20 hover:bg-red-500 hover:text-white">SELL</button>
                                </div>
                            </div>
                            <div ref={chartRef}></div>
                        </div>

                        <div className="lg:col-span-4 space-y-6">
                            <div className="glass rounded-[2rem] p-8 border border-teal-500/20 h-full">
                                <h4 className="text-gray-500 text-[10px] font-black uppercase tracking-widest mb-4">Market Bias</h4>
                                <p className="text-4xl font-black text-teal-400 tracking-tighter">BULLISH BOS</p>
                                <div className="mt-8 space-y-4">
                                    <div className="flex justify-between text-xs font-bold uppercase tracking-wider"><span>D1 Alignment:</span><span className="text-teal-400">STABLE</span></div>
                                    <div className="flex justify-between text-xs font-bold uppercase tracking-wider"><span>H4 Structure:</span><span className="text-teal-400">ALIGNED</span></div>
                                    <div className="flex justify-between text-xs font-bold uppercase tracking-wider"><span>Session:</span><span className="text-white">LONDON</span></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="glass rounded-[2.5rem] overflow-hidden border border-white/5">
                        <div className="p-8 border-b border-white/5 font-bold uppercase text-xs tracking-widest text-gray-500">Execution Log</div>
                        <table className="w-full text-left">
                            <thead className="bg-white/5 text-[10px] font-black uppercase text-gray-500 tracking-widest">
                                <tr>
                                    <th className="p-6">Asset</th><th className="p-6">Type</th><th className="p-6">Lots</th><th className="p-6">Price</th><th className="p-6">Profit</th><th className="p-6">Execution</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-white/5 mono text-xs">
                                {trades.map(t => (
                                    <tr key={t.id} className="hover:bg-white/5 transition-colors">
                                        <td className="p-6 font-bold text-white">{t.symbol}</td>
                                        <td className={`p-6 font-bold ${t.type === 'BUY' ? 'text-teal-400' : 'text-red-500'}`}>{t.type}</td>
                                        <td className="p-6 text-gray-400">{t.lots}</td>
                                        <td className="p-6 text-gray-600">{t.entry_price}</td>
                                        <td className={`p-6 font-bold ${parseFloat(t.profit) >= 0 ? 'text-teal-400' : 'text-red-500'}`}>${t.profit}</td>
                                        <td className="p-6">
                                            {t.status === 'OPEN' ? 
                                                <button onClick={()=>settleTrade(t.id)} className="bg-teal-500/10 text-teal-500 border border-teal-500/30 px-4 py-1.5 rounded-lg text-[9px] font-black hover:bg-teal-500 hover:text-black">SETTLE</button> :
                                                <span className="text-gray-700 font-black italic">CLOSED</span>
                                            }
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const StatCard = ({ label, value, sub, color }) => (
            <div className="glass p-6 rounded-3xl hover:border-teal-500/40 transition-all cursor-pointer">
                <p className="text-gray-500 text-[10px] font-black uppercase tracking-[0.2em] mb-2">{label}</p>
                <p className={`text-3xl font-black ${color} tracking-tighter mb-1`}>{value}</p>
                <p className="text-[10px] text-gray-600 font-bold uppercase">{sub}</p>
            </div>
        );

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
